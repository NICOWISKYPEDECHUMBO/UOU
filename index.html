document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

4px;letter-spacing:1px;margin:6px 0 16px\">Resultados ({{ resultsCount }})<\u002Fh2>\n      <sc-for list=\"{{ results }}\" as=\"r\" hint-placeholder-count=\"2\">\n        <div sc-camel-on-click=\"{{ r.open }}\" style=\"display:flex;align-items:center;gap:12px;background:#fdfaf0;border:2.5px solid #1a1714;border-radius:10px;padding:11px 13px;box-shadow:3px 3px 0 rgba(26,23,20,.18);margin-bottom:10px;cursor:pointer\">\n          <div style=\"width:38px;height:38px;border:2.5px solid #1a1714;border-radius:8px;background:#fff;display:grid;place-items:center;overflow:hidden;flex:none\">\n            {{ r.favImg }}\n          <\u002Fdiv>\n          <div style=\"flex:1;min-width:0\">\n            <div style=\"font-weight:800;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ r.name }}<\u002Fdiv>\n            <div style=\"font-size:12px;color:#8a857c;font-family:'Patrick Hand',cursive\">{{ r.path }}<\u002Fdiv>\n          <\u002Fdiv>\n          <button sc-camel-on-click=\"{{ r.goto }}\" style=\"font-weight:800;font-size:12px;color:#1a1714;background:#ffd23f;border:2.5px solid #1a1714;border-radius:8px;padding:6px 10px;cursor:pointer;flex:none\">ir até a pasta<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <sc-if value=\"{{ noResults }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align:center;color:#5c574e;font-family:'Patrick Hand',cursive;font-size:20px;padding:40px\">Nada encontrado por aqui.<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ============ ROOM ============ -->\n  <sc-if value=\"{{ isRoom }}\" hint-placeholder-val=\"{{ true }}\">\n    <main style=\"max-width:1120px;margin:0 auto;padding:22px 24px;position:relative\">\n      <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:14px\">\n        <h1 style=\"font-family:'Bangers',cursive;font-size:46px;letter-spacing:1px;margin:0\">Seus Armários<\u002Fh1>\n        <sc-if value=\"{{ showSlogan }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"transform:rotate(2.5deg);background:#faf5e6;border:4px solid #1a1714;box-shadow:5px 5px 0 #1a1714;padding:11px 16px;font-family:'Bangers',cursive;font-size:18px;line-height:1.1;max-width:200px;text-align:center\">ORGANIZAR É ENCONTRAR RAPIDINHO!<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ noCabinets }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align:center;color:#5c574e;font-family:'Patrick Hand',cursive;font-size:22px;padding:30px 0\">Nenhum armário ainda. Toque em <b>+ Armário<\u002Fb> para criar o primeiro.<\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"display:flex;flex-wrap:wrap;gap:30px;align-items:flex-end;margin-top:10px\">\n        <sc-for list=\"{{ cabinets }}\" as=\"c\" hint-placeholder-count=\"3\">\n          <div sc-camel-on-click=\"{{ c.open }}\" style=\"position:relative;width:206px;cursor:pointer;animation:pop .25s ease;--tint:{{ c.color }}\">\n            <button sc-camel-on-click=\"{{ c.del }}\" title=\"Excluir armário\" style=\"position:absolute;top:-10px;right:-10px;width:26px;height:26px;border-radius:50%;background:#cf5c4b;color:#fff;border:3px solid #1a1714;font-weight:800;font-size:15px;cursor:pointer;z-index:6;line-height:1\">×<\u002Fbutton>\n            <div style=\"position:relative;z-index:4;margin:0 auto -7px;width:88%;background:#f3ecd8;border:3px solid #1a1714;border-radius:6px;transform:rotate(-1.3deg);box-shadow:2px 2px 0 #1a1714;padding:4px 8px\">\n              <input value=\"{{ c.name }}\" sc-camel-on-change=\"{{ c.rename }}\" sc-camel-on-click=\"{{ c.stop }}\" style=\"width:100%;border:none;background:none;text-align:center;font-family:'Patrick Hand',cursive;font-size:19px;outline:none;color:#1a1714\">\n            <\u002Fdiv>\n            <div style=\"border:3px solid #1a1714;border-radius:8px;box-shadow:5px 5px 0 #1a1714;background:linear-gradient(180deg,rgba(255,255,255,.3),rgba(0,0,0,.04) 28%,rgba(0,0,0,.2)),var(--tint);padding:16px 13px 12px;position:relative;overflow:hidden\">\n              <input type=\"color\" value=\"{{ c.color }}\" sc-camel-on-change=\"{{ c.setColor }}\" sc-camel-on-click=\"{{ c.stop }}\" title=\"Cor do armário\" style=\"position:absolute;top:9px;right:9px;width:24px;height:24px;border:2.5px solid #1a1714;border-radius:5px;padding:0;cursor:pointer;background:none;z-index:5\">\n              <div style=\"height:44px;margin-bottom:10px;border:2.5px solid rgba(0,0,0,.42);border-radius:6px;background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(0,0,0,.16));display:grid;place-items:center\"><div style=\"width:48px;height:11px;border-radius:6px;background:rgba(0,0,0,.4);border:2px solid rgba(0,0,0,.5)\"><\u002Fdiv><\u002Fdiv>\n              <div style=\"height:44px;margin-bottom:10px;border:2.5px solid rgba(0,0,0,.42);border-radius:6px;background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(0,0,0,.16));display:grid;place-items:center\"><div style=\"width:48px;height:11px;border-radius:6px;background:rgba(0,0,0,.4);border:2px solid rgba(0,0,0,.5)\"><\u002Fdiv><\u002Fdiv>\n              <div style=\"height:44px;border:2.5px solid rgba(0,0,0,.42);border-radius:6px;background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(0,0,0,.16));display:grid;place-items:center\"><div style=\"width:48px;height:11px;border-radius:6px;background:rgba(0,0,0,.4);border:2px solid rgba(0,0,0,.5)\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"text-align:center;font-size:12px;font-weight:800;color:#3a362f;margin-top:7px;font-family:'Patrick Hand',cursive\">{{ c.meta }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n\n        <button sc-camel-on-click=\"{{ addCabinet }}\" style=\"width:206px;min-height:186px;border:3px dashed #1a1714;border-radius:8px;background:rgba(255,255,255,.28);font-family:'Patrick Hand',cursive;font-size:21px;color:#1a1714;cursor:pointer;display:flex;align-items:center;justify-content:center\" style-active=\"transform:translate(2px,2px)\">+ Novo armário<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:36px;height:30px;border-top:4px solid rgba(0,0,0,.18);background-image:linear-gradient(90deg,rgba(0,0,0,.06) 1px,transparent 1px);background-size:46px 100%;border-radius:0 0 8px 8px\"><\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ============ CABINET (drawers) ============ -->\n  <sc-if value=\"{{ isCabinet }}\" hint-placeholder-val=\"{{ false }}\">\n    <main style=\"max-width:780px;margin:8px auto;padding:14px 24px\">\n      <h2 style=\"font-family:'Bangers',cursive;font-size:38px;letter-spacing:1px;margin:6px 0 14px\">{{ cabName }}<\u002Fh2>\n      <div style=\"border:3px solid #1a1714;border-radius:12px;box-shadow:6px 6px 0 #1a1714;background:linear-gradient(180deg,rgba(255,255,255,.26),rgba(0,0,0,.05) 20%,rgba(0,0,0,.18)),var(--cabtint);padding:20px;--cabtint:{{ cabColor }}\">\n        <sc-if value=\"{{ noDrawers }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center;color:#3a362f;font-family:'Patrick Hand',cursive;font-size:20px;padding:6px 0 16px\">Armário vazio. Adicione uma gaveta abaixo.<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-for list=\"{{ drawers }}\" as=\"d\" hint-placeholder-count=\"3\">\n          <div sc-camel-on-click=\"{{ d.open }}\" style=\"position:relative;display:flex;align-items:center;gap:16px;padding:0 16px;height:66px;border:3px solid #1a1714;border-radius:8px;margin-bottom:13px;background:linear-gradient(180deg,rgba(255,255,255,.24),rgba(0,0,0,.16));box-shadow:3px 3px 0 #1a1714;cursor:pointer;animation:pop .2s ease\">\n            <div style=\"width:74px;height:14px;border-radius:7px;background:rgba(0,0,0,.42);border:2px solid rgba(0,0,0,.55);flex:none\"><\u002Fdiv>\n            <div style=\"flex:1;background:#f3ecd8;border:2.5px solid #1a1714;border-radius:6px;transform:rotate(-.6deg);box-shadow:2px 2px 0 #1a1714;padding:3px 10px\">\n              <input value=\"{{ d.name }}\" sc-camel-on-change=\"{{ d.rename }}\" sc-camel-on-click=\"{{ d.stop }}\" style=\"width:100%;border:none;background:none;font-family:'Patrick Hand',cursive;font-size:19px;outline:none;color:#1a1714\">\n            <\u002Fdiv>\n            <div style=\"font-size:12px;font-weight:800;color:#2a2620;font-family:'Patrick Hand',cursive;white-space:nowrap;flex:none\">{{ d.meta }}<\u002Fdiv>\n            <button sc-camel-on-click=\"{{ d.del }}\" title=\"Excluir gaveta\" style=\"width:26px;height:26px;border-radius:50%;background:#cf5c4b;color:#fff;border:2.5px solid #1a1714;font-weight:800;cursor:pointer;flex:none;line-height:1\">×<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <button sc-camel-on-click=\"{{ addDrawer }}\" style=\"width:100%;height:54px;border:3px dashed #1a1714;border-radius:8px;background:rgba(255,255,255,.3);font-family:'Patrick Hand',cursive;font-size:19px;color:#1a1714;cursor:pointer\">+ nova gaveta<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ============ DRAWER (folders) ============ -->\n  <sc-if value=\"{{ isDrawer }}\" hint-placeholder-val=\"{{ false }}\">\n    <main style=\"max-width:980px;margin:8px auto;padding:14px 24px\">\n      <h2 style=\"font-family:'Bangers',cursive;font-size:36px;letter-spacing:1px;margin:6px 0 14px\">Gaveta: {{ drawerName }}<\u002Fh2>\n      <div style=\"border:3px solid #1a1714;border-radius:12px;box-shadow:6px 6px 0 #1a1714;background:linear-gradient(180deg,#8f9591,#6f7470);padding:24px 22px\">\n        <sc-if value=\"{{ noFolders }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center;color:#f3ecd8;font-family:'Patrick Hand',cursive;font-size:20px;padding:0 0 16px\">Gaveta vazia. Crie uma pasta para colar seus links.<\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:24px\">\n          <sc-for list=\"{{ folders }}\" as=\"f\" hint-placeholder-count=\"4\">\n            <div sc-camel-on-click=\"{{ f.open }}\" style=\"position:relative;height:178px;cursor:pointer;animation:pop .2s ease;opacity:{{ f.archivedOpacity }}\">\n              <button sc-camel-on-click=\"{{ f.del }}\" title=\"Excluir pasta\" style=\"position:absolute;top:-8px;right:-8px;width:24px;height:24px;border-radius:50%;background:#cf5c4b;color:#fff;border:2.5px solid #1a1714;font-weight:800;cursor:pointer;z-index:9;line-height:1\">×<\u002Fbutton>\n              <div sc-camel-on-click=\"{{ f.openColor }}\" title=\"Toque para colorir\" style=\"position:absolute;left:0;right:0;top:0;bottom:34px;border:3px solid #1a1714;border-radius:10px;overflow:hidden;background:#faf5e6;box-shadow:4px 4px 0 #1a1714;display:grid;place-items:center;z-index:1;cursor:pointer\">\n                <sc-if value=\"{{ f.hasImage }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"position:relative;width:100%;height:100%\">\n                    {{ f.colorImg }}\n                    {{ f.grayImg }}\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ f.noImage }}\" hint-placeholder-val=\"{{ true }}\">\n                  <button sc-camel-on-click=\"{{ f.uploadClick }}\" style=\"background:none;border:2.5px dashed #1a1714;border-radius:8px;padding:10px 14px;font-family:'Patrick Hand',cursive;font-size:15px;color:#5c574e;cursor:pointer;position:relative;z-index:2\">+ foto<\u002Fbutton>\n                <\u002Fsc-if>\n                <input type=\"file\" accept=\"image/*\" ref=\"{{ f.setInputRef }}\" sc-camel-on-change=\"{{ f.onImageFile }}\" sc-camel-on-click=\"{{ f.stop }}\" style=\"display:none\">\n                <sc-if value=\"{{ f.archived }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"position:absolute;inset:0;background:rgba(26,23,20,.28);display:grid;place-items:center;z-index:3;pointer-events:none\">\n                    <div style=\"color:#9be15d;border:3px solid #9be15d;border-radius:8px;padding:3px 12px;font-family:'Bangers',cursive;font-size:19px;letter-spacing:1px;transform:rotate(-10deg);background:rgba(26,23,20,.5)\">ARQUIVADO<\u002Fdiv>\n                  <\u002Fdiv>\n                  <button sc-camel-on-click=\"{{ f.unarchive }}\" title=\"Restaurar\" style=\"position:absolute;bottom:6px;right:6px;z-index:4;font-size:11px;font-weight:800;background:#faf5e6;border:2px solid #1a1714;border-radius:7px;padding:3px 8px;cursor:pointer\">restaurar<\u002Fbutton>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"position:absolute;left:0;right:0;bottom:0;height:34px;background:#f3ecd8;border:2.5px solid #1a1714;border-radius:8px;z-index:1;display:flex;align-items:center;gap:6px;padding:0 8px\">\n                <input value=\"{{ f.name }}\" sc-camel-on-change=\"{{ f.rename }}\" sc-camel-on-click=\"{{ f.stop }}\" style=\"flex:1;min-width:0;border:none;background:none;font-family:'Patrick Hand',cursive;font-size:16px;outline:none;color:#1a1714\">\n                <span style=\"font-size:10px;font-weight:800;color:#5c574e;flex:none\">{{ f.meta }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <button sc-camel-on-click=\"{{ addFolder }}\" style=\"height:158px;border:3px dashed #1a1714;border-radius:10px;background:rgba(255,255,255,.3);font-family:'Patrick Hand',cursive;font-size:20px;color:#1a1714;cursor:pointer\">+ nova pasta<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ showColorModal }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;background:rgba(20,18,15,.72);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px\">\n      <div style=\"background:#faf5e6;border:4px solid #1a1714;border-radius:16px;box-shadow:8px 8px 0 #1a1714;padding:22px;width:min(560px,92vw);display:flex;flex-direction:column;gap:14px\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px\">\n          <h3 style=\"font-family:'Bangers',cursive;font-size:26px;margin:0;letter-spacing:1px\">{{ colorModal.name }}<\u002Fh3>\n          <button sc-camel-on-click=\"{{ colorModal.close }}\" style=\"width:30px;height:30px;border-radius:50%;background:#cf5c4b;color:#fff;border:2.5px solid #1a1714;font-weight:800;cursor:pointer;line-height:1;font-size:16px\">×<\u002Fbutton>\n        <\u002Fdiv>\n        <div sc-camel-on-pointer-down=\"{{ colorModal.onDown }}\" style=\"position:relative;width:100%;height:min(60vh,440px);border:3px solid #1a1714;border-radius:10px;overflow:hidden;background:#e5ddc4;cursor:crosshair;touch-action:none;display:grid;grid-template-columns:repeat({{ colorModal.cols }},1fr)\">\n          <sc-for list=\"{{ colorModal.cells }}\" as=\"cell\" hint-placeholder-count=\"70\">\n            <div style=\"{{ cell.style }}\"><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:10px\">\n          <div style=\"flex:1;height:12px;background:#e5ddc4;border:2px solid #1a1714;border-radius:6px;overflow:hidden\">\n            <div style=\"height:100%;background:#9be15d;width:{{ colorModal.pct }}\"><\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"font-weight:800;font-family:'Patrick Hand',cursive;font-size:16px\">{{ colorModal.pct }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:'Patrick Hand',cursive;font-size:16px;color:#5c574e;text-align:center\">Arraste sobre a foto para pintar quadradinho por quadradinho. Ao completar 100%, a pasta é arquivada.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ FOLDER (links) ============ -->\n  <sc-if value=\"{{ isFolder }}\" hint-placeholder-val=\"{{ false }}\">\n    <main style=\"max-width:880px;margin:16px auto;padding:0 22px\">\n      <div style=\"display:flex;align-items:flex-end;gap:12px;position:relative;z-index:2;flex-wrap:wrap\">\n        <div style=\"background:linear-gradient(180deg,#e9b24a,#d4901c);border:3px solid #1a1714;border-bottom:none;border-radius:14px 18px 0 0;padding:10px 18px 16px;box-shadow:4px 0 0 rgba(0,0,0,.12);min-width:240px\">\n          <input value=\"{{ folderName }}\" sc-camel-on-change=\"{{ renameFolderCur }}\" style=\"width:100%;border:none;background:none;font-family:'Patrick Hand',cursive;font-size:25px;outline:none;color:#1a1714\">\n        <\u002Fdiv>\n        <div style=\"flex:1\"><\u002Fdiv>\n        <span style=\"background:#1a1714;color:#faf5e6;border-radius:14px;padding:5px 13px;font-weight:800;font-size:13px;margin-bottom:6px\">{{ folderCountMeta }}<\u002Fspan>\n        <button sc-camel-on-click=\"{{ deleteFolderCur }}\" style=\"display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:13px;color:#fff;background:#cf5c4b;border:3px solid #1a1714;border-radius:10px;padding:7px 12px;box-shadow:3px 3px 0 #1a1714;cursor:pointer;margin-bottom:6px\">Excluir pasta<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:-3px;background:#fdfaf0;background-image:repeating-linear-gradient(180deg,transparent 0 31px,rgba(26,23,20,.07) 31px 32px);border:3px solid #1a1714;border-radius:0 14px 14px 14px;box-shadow:6px 6px 0 rgba(26,23,20,.22);padding:18px\">\n\n        <!-- marker palette -->\n        <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:4px 6px 14px;border-bottom:2px dashed rgba(26,23,20,.25);margin-bottom:14px\">\n          <span style=\"font-family:'Bangers',cursive;font-size:20px;letter-spacing:1px;margin-right:2px\">Marca-texto:<\u002Fspan>\n          <sc-for list=\"{{ pens }}\" as=\"p\" hint-placeholder-count=\"5\">\n            <button sc-camel-on-click=\"{{ p.pick }}\" title=\"Pintar a linha\" style=\"{{ p.wrap }}\">\n              <span style=\"position:absolute;left:8px;right:8px;top:0;height:9px;background:#1a1714;border-radius:4px 4px 0 0\"><\u002Fspan>\n              <span style=\"position:absolute;left:5px;right:5px;top:6px;height:44px;background:var(--c);border:3px solid #1a1714;border-radius:6px 6px 3px 3px\"><\u002Fspan>\n              <span style=\"position:absolute;left:7px;right:7px;top:48px;height:17px;background:var(--c);border:3px solid #1a1714;border-top:none;clip-path:polygon(0 0,100% 0,62% 100%,38% 100%);filter:brightness(.9)\"><\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n          <label title=\"Cor personalizada\" style=\"position:relative;width:30px;height:72px;cursor:pointer;display:inline-block\">\n            <span style=\"position:absolute;left:8px;right:8px;top:0;height:9px;background:#1a1714;border-radius:4px 4px 0 0\"><\u002Fspan>\n            <span style=\"position:absolute;left:5px;right:5px;top:6px;height:44px;background:conic-gradient(#ff5d5d,#ffd23f,#9be15d,#7cc5ff,#c08bff,#ff5d5d);border:3px solid #1a1714;border-radius:6px 6px 3px 3px\"><\u002Fspan>\n            <span style=\"position:absolute;left:7px;right:7px;top:48px;height:17px;background:#bbb;border:3px solid #1a1714;border-top:none;clip-path:polygon(0 0,100% 0,62% 100%,38% 100%)\"><\u002Fspan>\n            <input type=\"color\" sc-camel-on-change=\"{{ onCustomPen }}\" style=\"position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%\">\n          <\u002Flabel>\n          <button sc-camel-on-click=\"{{ selectEraser }}\" title=\"Borracha\" style=\"{{ eraserWrap }}\">\n            <span style=\"position:absolute;left:5px;right:5px;top:6px;height:36px;background:#e9e3d4;border:3px solid #1a1714;border-radius:6px\"><\u002Fspan>\n            <span style=\"position:absolute;left:5px;right:5px;top:42px;height:24px;background:#9aa0d8;border:3px solid #1a1714;border-top:none;border-radius:0 0 6px 6px\"><\u002Fspan>\n          <\u002Fbutton>\n          <button sc-camel-on-click=\"{{ markerOff }}\" style=\"margin-left:auto;font-weight:800;font-size:13px;color:#1a1714;background:#faf5e6;border:3px solid #1a1714;border-radius:10px;padding:8px 13px;box-shadow:3px 3px 0 #1a1714;cursor:pointer\">Guardar caneta<\u002Fbutton>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ markerOn }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#fff3c4;border:2.5px solid #1a1714;border-radius:10px;padding:8px 12px;margin-bottom:14px;font-family:'Patrick Hand',cursive;font-size:17px\">Caneta na mão! <b>Arraste<\u002Fb> sobre a linha do link para pintar — ou <b>toque<\u002Fb> para pintar a linha toda.<\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- links -->\n        <sc-if value=\"{{ noLinks }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center;color:#5c574e;font-family:'Patrick Hand',cursive;font-size:20px;padding:18px 0\">Pasta vazia. Cole o primeiro link logo abaixo.<\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-for list=\"{{ links }}\" as=\"l\" hint-placeholder-count=\"3\">\n          <div sc-camel-on-click=\"{{ l.open }}\" sc-camel-on-pointer-down=\"{{ l.onDown }}\" sc-camel-on-pointer-move=\"{{ l.onMove }}\" sc-camel-on-pointer-up=\"{{ l.onUp }}\" sc-camel-on-pointer-cancel=\"{{ l.onUp }}\" style=\"{{ l.rowStyle }}\">\n            <div style=\"width:40px;height:40px;border:2.5px solid #1a1714;border-radius:9px;background:#fff;display:grid;place-items:center;overflow:hidden;position:relative;flex:none;z-index:2\">\n              {{ l.favImg }}\n            <\u002Fdiv>\n            <div style=\"flex:1;min-width:0;position:relative;z-index:2\">\n              <div style=\"font-weight:800;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ l.name }}<\u002Fdiv>\n              <div style=\"font-size:12px;color:#8a857c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Patrick Hand',cursive\">{{ l.host }}<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ l.resolved }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"position:absolute;left:50%;top:50%;transform:translateY(-50%) rotate(-12deg);color:#2e8b57;border:3px solid #2e8b57;border-radius:8px;padding:1px 9px;font-family:'Bangers',cursive;font-size:17px;letter-spacing:1px;opacity:.9;pointer-events:none;animation:stampin .25s ease;z-index:4\">RESOLVIDO<\u002Fdiv>\n            <\u002Fsc-if>\n            <div sc-camel-on-pointer-down=\"{{ stopPE }}\" style=\"display:flex;align-items:center;gap:7px;position:relative;z-index:5;flex:none\">\n              <button sc-camel-on-click=\"{{ l.openBtn }}\" title=\"Abrir vídeo\" style=\"display:grid;place-items:center;width:32px;height:32px;border:2.5px solid #1a1714;border-radius:8px;background:#fff;cursor:pointer;color:#1a1714\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 4h6v6\"><\u002Fpath><path d=\"M20 4l-9 9\"><\u002Fpath><path d=\"M18 13v6H5V6h6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n              <button sc-camel-on-click=\"{{ l.toggle }}\" title=\"Marcar como resolvido\" style=\"{{ l.resBtn }}\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"4 12 10 18 20 5\"><\u002Fpolyline><\u002Fsvg><\u002Fbutton>\n              <button sc-camel-on-click=\"{{ l.del }}\" title=\"Excluir link\" style=\"display:grid;place-items:center;width:32px;height:32px;border:2.5px solid #1a1714;border-radius:8px;background:#ffd9d4;cursor:pointer;color:#1a1714\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 7h16\"><\u002Fpath><path d=\"M9 7V4h6v3\"><\u002Fpath><path d=\"M6 7l1 13h10l1-13\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"{{ l.swashStyle }}\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n\n        <!-- add link -->\n        <div style=\"display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:16px;padding-top:16px;border-top:2px dashed rgba(26,23,20,.25)\">\n          <input ref=\"{{ linkNameRef }}\" placeholder=\"Nome do vídeo\" style=\"flex:1;min-width:150px;border:2.5px solid #1a1714;border-radius:9px;padding:9px 12px;font-size:15px;font-weight:600;background:#fff;outline:none\">\n          <input ref=\"{{ linkUrlRef }}\" sc-camel-on-key-down=\"{{ onAddLinkKey }}\" placeholder=\"Cole o link do vídeo aqui\" style=\"flex:2;min-width:180px;border:2.5px solid #1a1714;border-radius:9px;padding:9px 12px;font-size:15px;font-weight:600;background:#fff;outline:none\">\n          <button sc-camel-on-click=\"{{ addLink }}\" style=\"font-weight:800;font-size:15px;color:#1a1714;background:#9be15d;border:3px solid #1a1714;border-radius:10px;padding:9px 16px;box-shadow:3px 3px 0 #1a1714;cursor:pointer\" style-active=\"transform:translate(2px,2px);box-shadow:1px 1px 0 #1a1714\">+ Colar link<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fsc-if>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:820},&quot;showSlogan&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;powAnimation&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;defaultMarker&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Amarelo&quot;,&quot;options&quot;:[&quot;Amarelo&quot;,&quot;Verde&quot;,&quot;Rosa&quot;,&quot;Azul&quot;,&quot;Laranja&quot;],&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.linkName = React.createRef();\n    this.linkUrl = React.createRef();\n    this.importRef = React.createRef();\n    const penMap = {Amarelo:'#ffe14d', Verde:'#9be15d', Rosa:'#ff8fb1', Azul:'#7cc5ff', Laranja:'#ffb24d'};\n    this.state = {\n      data: this.load(),\n      view: 'room',\n      cabinetId: null, drawerId: null, folderId: null,\n      search: '',\n      markerOn: false,\n      markerColor: penMap[this.props.defaultMarker] || '#ffe14d',\n      painting: null\n    };\n  }\n\n  KEY = 'guardador.de.links.v1';\n  uid(){ return Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-3); }\n\n  load(){\n    try { const r = localStorage.getItem(this.KEY); if(r){ const d = JSON.parse(r); if(d && Array.isArray(d.cabinets)) return d; } } catch(e){}\n    return this.seed();\n  }\n  save(data){ try { localStorage.setItem(this.KEY, JSON.stringify(data)); } catch(e){} }\n\n  seed(){\n    const u = () => this.uid();\n    return { cabinets: [{\n      id:u(), name:'Vídeos de Estudo', color:'#e3a734',\n      drawers:[{ id:u(), name:'Front-end', folders:[\n        { id:u(), name:'CSS', image:null, coverHighlight:null, archived:false, links:[\n          { id:u(), name:'Flexbox em 12 minutos', url:'https://www.youtube.com/watch?v=K74l26pE4YA', resolved:false, highlight:null },\n          { id:u(), name:'Guia completo de Grid', url:'https://www.youtube.com/watch?v=t6CBKf8K_Ac', resolved:true, highlight:{color:'#9be15d',from:3,to:97} }\n        ]},\n        { id:u(), name:'JavaScript', image:null, coverHighlight:null, archived:false, links:[\n          { id:u(), name:'Async/await sem medo', url:'https://www.youtube.com/watch?v=V_Kr9OSfDeU', resolved:false, highlight:null }\n        ]}\n      ]}]\n    }] };\n  }\n\n  update(fn){\n    const data = structuredClone(this.state.data);\n    fn(data);\n    this.save(data);\n    this.setState({ data });\n  }\n\n  // ---- finders\n  cab(d){ return d.cabinets.find(c=>c.id===this.state.cabinetId); }\n  dr(d){ const c=this.cab(d); return c && c.drawers.find(x=>x.id===this.state.drawerId); }\n  fol(d){ const x=this.dr(d); return x && x.folders.find(f=>f.id===this.state.folderId); }\n\n  // ---- cabinets\n  nextColor(d){ const p=['#e3a734','#cf5c4b','#4f7bbf','#5aa469','#9b6bb0','#d98c3f','#3f9b9b']; return p[d.cabinets.length % p.length]; }\n  addCabinet(){ this.update(d=>{ d.cabinets.push({id:this.uid(), name:'Novo armário', color:this.nextColor(d), drawers:[]}); }); }\n  renameCabinet(id,v){ this.update(d=>{ const c=d.cabinets.find(c=>c.id===id); if(c) c.name=v; }); }\n  setCabinetColor(id,v){ this.update(d=>{ const c=d.cabinets.find(c=>c.id===id); if(c) c.color=v; }); }\n  deleteCabinet(id){ if(!confirm('Excluir este armário e tudo dentro dele?')) return; this.update(d=>{ d.cabinets=d.cabinets.filter(c=>c.id!==id); }); if(this.state.cabinetId===id) this.setState({view:'room'}); }\n  openCabinet(id){ this.setState({cabinetId:id, view:'cabinet'}); }\n\n  // ---- drawers\n  addDrawer(){ this.update(d=>{ const c=this.cab(d); if(c) c.drawers.push({id:this.uid(), name:'Nova gaveta', folders:[]}); }); }\n  renameDrawer(id,v){ this.update(d=>{ const c=this.cab(d); const x=c&&c.drawers.find(x=>x.id===id); if(x) x.name=v; }); }\n  deleteDrawer(id){ if(!confirm('Excluir esta gaveta e suas pastas?')) return; this.update(d=>{ const c=this.cab(d); if(c) c.drawers=c.drawers.filter(x=>x.id!==id); }); if(this.state.drawerId===id) this.setState({view:'cabinet'}); }\n  openDrawer(id){ this.setState({drawerId:id, view:'drawer'}); }\n\n  // ---- folders\n  addFolder(){ this.update(d=>{ const x=this.dr(d); if(x) x.folders.push({id:this.uid(), name:'Nova pasta', links:[], image:null, coverHighlight:null, archived:false}); }); }\n  renameFolder(id,v){ this.update(d=>{ const x=this.dr(d); const f=x&&x.folders.find(f=>f.id===id); if(f) f.name=v; }); }\n  deleteFolder(id){ if(!confirm('Excluir esta pasta e todos os links dela?')) return; this.update(d=>{ const x=this.dr(d); if(x) x.folders=x.folders.filter(f=>f.id!==id); }); if(this.state.folderId===id) this.setState({view:'drawer'}); }\n  openFolder(id){ this.setState({folderId:id, view:'folder', markerOn:false}); }\n  setFolderImage(id,dataUrl){ this.update(d=>{ const x=this.dr(d); const f=x&&x.folders.find(f=>f.id===id); if(f) f.image=dataUrl; }); }\n  onFolderImageFile(id,e){\n    const file=e.target.files && e.target.files[0]; if(!file) return;\n    const r=new FileReader();\n    r.onload=()=>this.setFolderImage(id, r.result);\n    r.readAsDataURL(file);\n    e.target.value='';\n  }\n  unarchiveFolder(id){ this.update(d=>{ const x=this.dr(d); const f=x&&x.folders.find(f=>f.id===id); if(f){ f.archived=false; f.revealed=0; f.revealedCells=[]; } }); }\n  openColorModal(id){ const d=this.state.data; const x=this.dr(d); const f=x&&x.folders.find(f=>f.id===id); if(f && f.image && !f.archived) this.setState({coloringId:id}); }\n  closeColorModal(){ this.setState({coloringId:null}); }\n  // ---- pixel-art reveal painting: drag over grid cells to reveal each pixel's real color\n  GRID_COLS=10; GRID_ROWS=7;\n  cellIndexAt(clientX,clientY,rect){\n    const col=Math.min(this.GRID_COLS-1, Math.max(0, Math.floor((clientX-rect.left)/rect.width*this.GRID_COLS)));\n    const row=Math.min(this.GRID_ROWS-1, Math.max(0, Math.floor((clientY-rect.top)/rect.height*this.GRID_ROWS)));\n    return row*this.GRID_COLS+col;\n  }\n  revealCell(folderId, idx){\n    let becameArchived=false;\n    this.update(d=>{\n      const x=this.dr(d); const f=x&&x.folders.find(f=>f.id===folderId); if(!f) return;\n      if(!f.revealedCells) f.revealedCells=[];\n      if(!f.revealedCells.includes(idx)) f.revealedCells.push(idx);\n      const total=this.GRID_COLS*this.GRID_ROWS;\n      f.revealed = f.revealedCells.length/total*100;\n      if(f.revealedCells.length>=total){ f.archived=true; becameArchived=true; }\n    });\n    if(becameArchived) this.setState({ coloringId:null });\n  }\n  coverPaintDown(id,e){\n    e.stopPropagation(); e.preventDefault();\n    this._coverRect=e.currentTarget.getBoundingClientRect();\n    this._coverWinMove=(ev)=>this.coverPaintMove(id,ev);\n    this._coverWinUp=(ev)=>this.coverPaintUp(ev);\n    window.addEventListener('pointermove', this._coverWinMove);\n    window.addEventListener('pointerup', this._coverWinUp);\n    window.addEventListener('pointercancel', this._coverWinUp);\n    this.revealCell(id, this.cellIndexAt(e.clientX,e.clientY,this._coverRect));\n  }\n  coverPaintMove(id,e){\n    if(!this._coverRect) return;\n    this.revealCell(id, this.cellIndexAt(e.clientX,e.clientY,this._coverRect));\n  }\n  detachCoverPaint(){\n    if(this._coverWinMove){ window.removeEventListener('pointermove', this._coverWinMove); this._coverWinMove=null; }\n    if(this._coverWinUp){ window.removeEventListener('pointerup', this._coverWinUp); window.removeEventListener('pointercancel', this._coverWinUp); this._coverWinUp=null; }\n  }\n  coverPaintUp(){ this.detachCoverPaint(); }\n\n  // ---- links\n  addLink(){\n    const n=this.linkName.current, u=this.linkUrl.current;\n    if(!u) return;\n    let url=(u.value||'').trim(); if(!url) return;\n    if(!/^https?:\\/\\//i.test(url)) url='https://'+url;\n    const name=(n&&n.value||'').trim() || url;\n    this.update(d=>{ const f=this.fol(d); if(f) f.links.push({id:this.uid(), name, url, resolved:false, highlight:null}); });\n    if(n) n.value=''; if(u) u.value=''; if(n) n.focus();\n  }\n  deleteLink(id){ this.update(d=>{ const f=this.fol(d); if(f) f.links=f.links.filter(l=>l.id!==id); }); }\n  toggleResolved(id){ this.update(d=>{ const f=this.fol(d); const l=f&&f.links.find(l=>l.id===id); if(l) l.resolved=!l.resolved; }); }\n  commitHighlight(id,hl){ this.update(d=>{ const f=this.fol(d); const l=f&&f.links.find(l=>l.id===id); if(l) l.highlight=hl; }); }\n  openLink(url){ window.open(url,'_blank','noopener'); }\n\n  // ---- highlighter painting\n  clamp(p){ return Math.max(0, Math.min(100, p)); }\n  pctAt(clientX){ const r=this._paintRect; if(!r) return 0; return this.clamp((clientX-r.left)/r.width*100); }\n plural(this.cLinks(c),'link')}`,\n      open:()=>this.openCabinet(c.id),\n      rename:(e)=>this.renameCabinet(c.id,e.target.value),\n      setColor:(e)=>this.setCabinetColor(c.id,e.target.value),\n      del:(e)=>{ e.stopPropagation(); this.deleteCabinet(c.id); },\n      stop:(e)=>e.stopPropagation()\n    }));\n\n    const drawers = cab ? cab.drawers.map(x=>({\n      id:x.id, name:x.name,\n      meta:`${this.plural(x.folders.length,'pasta')} · ${this.plural(this.dLinks(x),'link')}`,\n      open:()=>this.openDrawer(x.id),\n      rename:(e)=>this.renameDrawer(x.id,e.target.value),\n      del:(e)=>{ e.stopPropagation(); this.deleteDrawer(x.id); },\n      stop:(e)=>e.stopPropagation()\n    })) : [];\n\n    const folders = dr ? [...dr.folders].sort((a,b)=>(a.archived?1:0)-(b.archived?1:0)).map(f=>{\n      const revealed = f.revealed||0;\n      return {\n        id:f.id, name:f.name,\n        meta:this.plural(f.links.length,'link'),\n        image:f.image, hasImage:!!f.image, noImage:!f.image, archived:!!f.archived, archivedOpacity: f.archived?0.85:1,\n        colorImg: f.image ? React.createElement('img',{src:f.image, alt:'', style:{width:'100%',height:'100%',objectFit:'cover'}}) : null,\n        grayImg: f.image ? React.createElement('img',{src:f.image, alt:'', style:{width:'100%',height:'100%',objectFit:'cover',position:'absolute',left:0,top:0,filter: revealed>=100?'none':'grayscale(1) contrast(1.05)'}}) : null,\n        revealedPct: Math.round(revealed)+'%',\n        open:()=>{ if(!f.archived) this.openFolder(f.id); },\n        openColor:(e)=>{ e.stopPropagation(); this.openColorModal(f.id); },\n        rename:(e)=>this.renameFolder(f.id,e.target.value),\n        del:(e)=>{ e.stopPropagation(); this.deleteFolder(f.id); },\n        stop:(e)=>e.stopPropagation(),\n        uploadClick:(e)=>{ e.stopPropagation(); const inp=this._coverInputs && this._coverInputs[f.id]; if(inp) inp.click(); },\n        setInputRef:(el)=>{ if(!this._coverInputs) this._coverInputs={}; this._coverInputs[f.id]=el; },\n        onImageFile:(e)=>{ e.stopPropagation(); this.onFolderImageFile(f.id,e); },\n        unarchive:(e)=>{ e.stopPropagation(); this.unarchiveFolder(f.id); }\n      };\n    }) : [];\n\n    const coloring = dr ? dr.folders.find(f=>f.id===s.coloringId) : null;\n    let colorModal=null;\n    if(coloring){\n      const revealedCells = coloring.revealedCells || [];\n      const COLS=this.GRID_COLS, ROWS=this.GRID_ROWS;\n      const cells=[];\n      for(let row=0; row<ROWS; row++){\n        for(let col=0; col<COLS; col++){\n          const idx=row*COLS+col;\n          const revealed=revealedCells.includes(idx);\n          cells.push({ key:idx, style:{\n            backgroundImage:`url(${coloring.image})`,\n            backgroundSize:`${COLS*100}% ${ROWS*100}%`,\n            backgroundPosition:`${COLS===1?0:col*100/(COLS-1)}% ${ROWS===1?0:row*100/(ROWS-1)}%`,\n            filter: revealed?'none':'grayscale(1) contrast(1.05)',\n            outline:'1px solid rgba(26,23,20,.15)'\n          }});\n        }\n      }\n      colorModal = {\n        show:true, name:coloring.name, pct:Math.round(coloring.revealed||0)+'%',\n        cells,\n        cols:COLS,\n        onDown:(e)=>this.coverPaintDown(coloring.id,e),\n        close:()=>this.closeColorModal()\n      };\n    }\n\n    const favOf=(url)=>{ try{ return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=64`; }catch(e){ return ''; } };\n    const hostOf=(url)=>{ try{ return new URL(url).hostname.replace(/^www\\./,''); }catch(e){ return url; } };\n\n    const rowBase='position:relative;display:flex;align-items:center;gap:12px;background:#fdfaf0;border:2.5px solid #1a1714;border-radius:10px;padding:11px 12px;box-shadow:3px 3px 0 rgba(26,23,20,.18);margin-bottom:10px;overflow:hidden;touch-action:none;';\n\n    const links = fol ? fol.links.map(l=>{\n      const pt = s.painting && s.painting.linkId===l.id ? s.painting : null;\n      let hl = pt ? (pt.color==='erase' ? null : {color:pt.color, from:pt.from, to:pt.to}) : l.highlight;\n      let swashStyle='display:none';\n      if(hl && hl.color && hl.color!=='erase'){\n        const lo=Math.min(hl.from,hl.to), w=Math.max(0.6,Math.abs(hl.to-hl.from));\n        swashStyle=`display:block;position:absolute;left:${lo}%;width:${w}%;top:8%;height:84%;background:${hl.color};mix-blend-mode:multiply;opacity:.62;border-radius:10px 14px 9px 13px;transform:rotate(-.5deg);-webkit-mask:repeating-linear-gradient(93deg,#000 0 15px,rgba(0,0,0,.6) 15px 20px);mask:repeating-linear-gradient(93deg,#000 0 15px,rgba(0,0,0,.6) 15px 20px);pointer-events:none;z-index:6`;\n      }\n      const resBtn=`display:grid;place-items:center;width:32px;height:32px;border:2.5px solid #1a1714;border-radius:8px;cursor:pointer;background:${l.resolved?'#2e8b57':'#d7f0dd'};color:${l.resolved?'#fff':'#1a1714'}`;\n      return {\n        id:l.id, name:l.name, host:hostOf(l.url), fav:favOf(l.url), resolved:l.resolved, swashStyle, resBtn,\n        favImg: React.createElement('img',{src:favOf(l.url), alt:'', style:{width:24,height:24}, onError:(e)=>{e.target.style.visibility='hidden';}}),\n        rowStyle: rowBase + (l.resolved?'opacity:.78;':'') + `cursor:${s.markerOn?'crosshair':'pointer'}`,\n        open:()=>{ if(!s.markerOn) this.openLink(l.url); },\n        openBtn:(e)=>{ e.stopPropagation(); this.openLink(l.url); },\n        toggle:(e)=>{ e.stopPropagation(); this.toggleResolved(l.id); },\n        del:(e)=>{ e.stopPropagation(); this.deleteLink(l.id); },\n        onDown:(e)=>this.paintDown(l.id,e),\n        onMove:(e)=>this.paintMove(e),\n        onUp:()=>this.paintUp()\n      };\n    }) : [];\n\n    let results=[];\n    if(searching){\n      d.cabinets.forEach(c=>c.drawers.forEach(x=>x.folders.forEach(f=>f.links.forEach(l=>{\n        if((l.name||'').toLowerCase().includes(q) || (l.url||'').toLowerCase().includes(q) || (f.name||'').toLowerCase().includes(q)){\n          results.push({\n            id:l.id, name:l.name, fav:favOf(l.url),\n            favImg: React.createElement('img',{src:favOf(l.url), alt:'', style:{width:24,height:24}, onError:(e)=>{e.target.style.visibility='hidden';}}),\n            path:`${c.name} › ${x.name} › ${f.name}`,\n            open:()=>this.openLink(l.url),\n            goto:(e)=>{ e.stopPropagation(); this.setState({cabinetId:c.id, drawerId:x.id, folderId:f.id, view:'folder', search:'', markerOn:false}); }\n          });\n        }\n      }))));\n    }\n\n    const penColors=['#ffe14d','#9be15d','#ff8fb1','#7cc5ff','#ffb24d'];\n    const penWrapBase='position:relative;width:30px;height:72px;background:none;border:none;cursor:pointer;padding:0;transition:transform .14s;';\n    const pens=penColors.map(c=>{\n      const active=s.markerOn && s.markerColor===c;\n      return { color:c, pick:()=>this.selectPen(c),\n        wrap: penWrapBase + `--c:${c};transform:translateY(${active?'-11px':'0'});filter:drop-shadow(2px 3px 0 rgba(0,0,0,${active?'.4':'.18'}))` + (active?';outline:none':'') };\n    });\n    const eraserActive=s.markerOn && s.markerColor==='erase';\n    const eraserWrap=penWrapBase + `transform:translateY(${eraserActive?'-11px':'0'});filter:drop-shadow(2px 3px 0 rgba(0,0,0,${eraserActive?'.4':'.18'}))`;\n\n    let powStyle=\"display:grid;place-items:center;position:absolute;right:-30px;top:-16px;width:54px;height:54px;background:#ffd23f;color:#e23b2e;font-family:'Bangers',cursive;font-size:17px;border:3px solid #1a1714;transform:rotate(8deg);clip-path:polygon(50% 0%,61% 22%,84% 16%,76% 39%,100% 50%,76% 61%,84% 84%,61% 78%,50% 100%,39% 78%,16% 84%,24% 61%,0% 50%,24% 39%,16% 16%,39% 22%)\";\n    if(this.props.powAnimation ?? true){ powStyle += \";animation:powp 1.6s ease-in-out infinite\"; }\n\n    return {\n      isRoom, isCabinet, isDrawer, isFolder, isSearching:searching,\n      notRoom: s.view!=='room' && !searching,\n      showCab: isCabinet||isDrawer||isFolder,\n      showDrawer: isDrawer||isFolder,\n      showFolder: isFolder,\n      cabinets, drawers, folders, links, results,\n      showColorModal: !!colorModal, colorModal: colorModal || {},\n      noCabinets: cabinets.length===0,\n      noDrawers: cab && cab.drawers.length===0,\n      noFolders: dr && dr.folders.length===0,\n      noLinks: fol && fol.links.length===0,\n      noResults: searching && results.length===0,\n      resultsCount: results.length,\n      addCabinet:()=>this.addCabinet(),\n      addDrawer:()=>this.addDrawer(),\n      addFolder:()=>this.addFolder(),\n      addLink:()=>this.addLink(),\n      onAddLinkKey:(e)=>{ if(e.key==='Enter') this.addLink(); },\n      linkNameRef:this.linkName, linkUrlRef:this.linkUrl, importRef:this.importRef,\n      searchVal:s.search, onSearch:(e)=>this.setState({search:e.target.value}),\n      clearSearch:()=>this.setState({search:''}),\n      goRoom:()=>this.setState({view:'room', search:''}),\n      goCabinet:()=>this.setState({view:'cabinet', search:''}),\n      goDrawer:()=>this.setState({view:'drawer', search:''}),\n      cabName: cab?cab.name:'', drawerName: dr?dr.name:'', folderName: fol?fol.name:'',\n      cabColor: cab?cab.color:'#e3a734',\n      folderCountMeta: fol ? this.plural(fol.links.length,'link') : '',\n      renameFolderCur:(e)=>{ if(fol) this.renameFolder(fol.id, e.target.value); },\n      deleteFolderCur:()=>{ if(fol) this.deleteFolder(fol.id); },\n      totalMeta:`${this.plural(totalCabinets,'armário')} · ${this.plural(totalLinks,'link')}`,\n      exportJSON:()=>this.exportJSON(),\n      importClick:()=>this.importRef.current && this.importRef.current.click(),\n      onImport:(e)=>this.onImport(e),\n      pens, eraserWrap,\n      markerOn:s.markerOn,\n      onCustomPen:(e)=>this.selectPen(e.target.value),\n      selectEraser:()=>this.selectPen('erase'),\n      markerOff:()=>this.setState({markerOn:false}),\n      favErr:(e)=>{ e.target.style.visibility='hidden'; },\n      stopPE:(e)=>e.stopPropagation(),\n      showSlogan: this.props.showSlogan ?? true,\n      powStyle\n    };\n  }\n}\n<\u002Fs
