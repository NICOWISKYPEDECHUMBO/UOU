<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#2a2622">
<title>ARQUIVO POW! — Corredor de Metas 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1a1714; --paper:#faf5e6; --paper2:#fdfaf0; --tag:#f3ecd8;
    --red:#cf5c4b; --yellow:#ffd23f; --green:#9be15d;
    --muted:#5c574e; --muted2:#8a857c;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:'Nunito',system-ui,sans-serif;color:var(--ink);
    background:#1b1814;overflow:hidden;overscroll-behavior:none;
  }
  input,button,select{font-family:inherit}
  button{touch-action:manipulation}
  ::selection{background:#ffe14d}
  .bangers{font-family:'Bangers',cursive;letter-spacing:1px}

  @keyframes pop{0%{transform:scale(.9)}100%{transform:scale(1)}}
  @keyframes powp{0%,100%{transform:rotate(8deg) scale(1)}50%{transform:rotate(8deg) scale(1.09)}}
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}
  @keyframes legL{0%,100%{transform:rotate(-22deg)}50%{transform:rotate(22deg)}}
  @keyframes legR{0%,100%{transform:rotate(22deg)}50%{transform:rotate(-22deg)}}
  @keyframes armL{0%,100%{transform:rotate(16deg)}50%{transform:rotate(-16deg)}}
  @keyframes armR{0%,100%{transform:rotate(-16deg)}50%{transform:rotate(16deg)}}
  @keyframes floaty{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,-8px)}}
  @keyframes throwArmR{0%{transform:rotate(-16deg)}35%{transform:rotate(-165deg)}70%{transform:rotate(30deg)}100%{transform:rotate(-16deg)}}
  @keyframes throwArmL{0%{transform:rotate(16deg)}35%{transform:rotate(-140deg)}70%{transform:rotate(25deg)}100%{transform:rotate(16deg)}}
  @keyframes shake{0%,100%{transform:translate(0,0)}20%{transform:translate(-7px,4px)}40%{transform:translate(6px,-3px)}60%{transform:translate(-4px,-4px)}80%{transform:translate(4px,3px)}}
  @keyframes crackpop{0%{transform:translate(-50%,-50%) rotate(-12deg) scale(.4);opacity:0}60%{transform:translate(-50%,-50%) rotate(-12deg) scale(1.25);opacity:1}100%{transform:translate(-50%,-50%) rotate(-12deg) scale(1);opacity:1}}
  @keyframes idlespin{0%{transform:rotateY(0deg)}100%{transform:rotateY(360deg)}}
  @keyframes idlesway{0%,100%{transform:rotateY(-16deg)}50%{transform:rotateY(16deg)}}
  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation:none !important;transition:none !important}
  }

  #errbox{
    position:fixed;left:8px;top:8px;right:8px;z-index:99;display:none;
    background:var(--red);color:#fff;border:3px solid var(--ink);border-radius:10px;
    padding:8px 12px;font-weight:800;font-size:13px;word-break:break-word;
  }

  /* ================= CORREDOR ================= */
  #viewport{
    position:fixed;inset:0;overflow:hidden;
    perspective:760px;perspective-origin:50% 50%;
    background:linear-gradient(180deg,#2f2a24 0%,#241f1a 55%,#191512 100%);
    touch-action:none;cursor:grab;
  }
  #viewport.dragging{cursor:grabbing}
  #shaker{position:absolute;inset:0;transform-style:preserve-3d}
  #viewport.shake #shaker{animation:shake .32s ease}
  #world{
    position:absolute;left:50%;top:50%;width:0;height:0;
    transform-style:preserve-3d;will-change:transform;
  }
  .face{position:absolute;transform-origin:0 0;backface-visibility:visible}
  .floor-face{
    background:
      repeating-linear-gradient(90deg, rgba(0,0,0,.28) 0 4px, transparent 4px 170px),
      repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0 3px, transparent 3px 170px),
      linear-gradient(90deg,#5f3f24,#8a5f38 50%,#5f3f24);
  }
  .ceil-face{
    background:
      repeating-linear-gradient(0deg, rgba(255,240,200,.10) 0 14px, transparent 14px 460px),
      linear-gradient(90deg,#201d17,#2c2822 50%,#201d17);
  }
  .wall-face{
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 3px, transparent 3px 210px),
      linear-gradient(180deg,#5b544a 0%,#4c463d 60%,#39342c);
  }

  /* ============ ESTANTE DE VIDRO COM PÉS ============ */
  .shelf-face{cursor:pointer;transform-style:preserve-3d}
  .shelf-glow{
    pointer-events:none;
    background:radial-gradient(50% 60% at 50% 30%, rgba(255,238,190,.26), rgba(255,238,190,.08) 55%, transparent 78%);
  }
  .shelf-face .glass{
    position:absolute;left:6px;right:6px;height:13px;
    background:linear-gradient(180deg,rgba(232,248,255,.92),rgba(154,200,220,.55));
    border:2px solid rgba(150,190,208,.9);border-radius:3px;
    box-shadow:0 6px 12px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.85);
  }
  .shelf-face .glass::after{
    content:'';position:absolute;left:-6px;right:-6px;top:11px;height:8px;
    background:linear-gradient(180deg,rgba(120,155,172,.6),rgba(60,85,100,.35));
    border-radius:0 0 5px 5px;
  }
  .shelf-face .post{
    position:absolute;top:0;bottom:26px;width:14px;
    background:linear-gradient(90deg,#c9ccd2,#8d9198 45%,#5f6369);
    border:2px solid #4a4d52;border-radius:5px;
    box-shadow:2px 0 6px rgba(0,0,0,.35);
  }
  .shelf-face .post.l{left:0}
  .shelf-face .post.r{right:0}
  .shelf-face .foot{
    position:absolute;bottom:0;width:38px;height:26px;
    background:linear-gradient(180deg,#9a9ea4,#54585e);
    border:2px solid #43464b;border-radius:5px 5px 8px 8px;
    box-shadow:0 6px 10px rgba(0,0,0,.45);
  }
  .shelf-face .foot.l{left:-11px}
  .shelf-face .foot.r{right:-11px}
  .shelf-face .crossbar{
    position:absolute;left:10px;right:10px;height:7px;
    background:linear-gradient(180deg,#a7abb1,#65696f);
    border:2px solid #4a4d52;border-radius:4px;
  }
  .shelf-face .titleplate{
    position:absolute;left:50%;top:-34px;transform:translateX(-50%) rotate(-1.5deg);
    background:var(--tag);border:4px solid var(--ink);border-radius:8px;
    padding:4px 14px;font-family:'Bangers',cursive;font-size:20px;letter-spacing:1px;
    box-shadow:3px 3px 0 var(--ink);white-space:nowrap;max-width:130%;
    overflow:hidden;text-overflow:ellipsis;
  }

  /* ============ objeto 3D ============ */
  .obj3d{position:absolute;width:86px;height:96px;cursor:pointer;transform-style:preserve-3d}
  .obj3d .spin{position:absolute;inset:0;transform-style:preserve-3d;animation:idlespin 9s linear infinite}
  .obj3d.wide .spin{animation:idlesway 6s ease-in-out infinite}
  .obj3d:hover .spin{animation-play-state:paused}
  .obj3d .f{
    position:absolute;inset:0;border:3px solid var(--ink);border-radius:6px;
    overflow:hidden;backface-visibility:hidden;background:#fff;
  }
  .obj3d .f img{width:100%;height:100%;object-fit:cover;background:#fff;display:block}
  .obj3d .front{transform:translateZ(14px)}
  .obj3d .back{transform:rotateY(180deg) translateZ(14px)}
  .obj3d .edge{
    position:absolute;top:0;bottom:0;width:28px;left:50%;margin-left:-14px;
    background:linear-gradient(90deg,#efe8d6,#d9d0b8 50%,#bdb298);
    border:3px solid var(--ink);
  }
  .obj3d .cap{
    position:absolute;left:0;right:0;height:28px;top:50%;margin-top:-14px;
    background:linear-gradient(180deg,#f6f1e2,#cfc6ae);
    border:3px solid var(--ink);
  }
  .obj3d .sombra{
    position:absolute;left:-8px;right:-8px;bottom:-12px;height:14px;
    background:radial-gradient(50% 50% at 50% 50%, rgba(0,0,0,.55), transparent 70%);
    pointer-events:none;
  }
  .obj3d.molde .layer{
    position:absolute;inset:0;
    background-size:cover;background-position:center;background-repeat:no-repeat;
    background-color:#efe8d6;border:2.5px solid var(--ink);
    border-radius:46% 54% 48% 52% / 62% 58% 40% 44%;
    backface-visibility:visible;
  }

  .photo-slot{
    position:absolute;width:86px;height:96px;cursor:pointer;
    border:3.5px dashed rgba(250,245,230,.85);border-radius:10px;background:rgba(255,255,255,.10);
    display:grid;place-items:center;font-family:'Patrick Hand',cursive;font-size:16px;color:#faf5e6;
    text-align:center;line-height:1.15;
  }
  .photo-slot:hover{background:rgba(255,255,255,.2)}

  .open-tip{
    position:absolute;left:50%;transform:translate(-50%,0);
    background:var(--yellow);border:4px solid var(--ink);border-radius:12px;
    font-family:'Bangers',cursive;font-size:22px;letter-spacing:1px;
    padding:5px 14px;box-shadow:4px 4px 0 var(--ink);white-space:nowrap;max-width:280px;
    overflow:hidden;text-overflow:ellipsis;
    animation:floaty 1.4s ease-in-out infinite;pointer-events:none;
  }
  .open-tip::after{
    content:'';position:absolute;left:50%;bottom:-12px;transform:translateX(-50%);
    border:8px solid transparent;border-top-color:var(--ink);
  }

  .pile-face{cursor:pointer}
  .pile-face .shard{
    position:absolute;background:linear-gradient(135deg,rgba(215,238,248,.9),rgba(150,195,215,.72));
    border:2px solid rgba(90,125,145,.85);
  }
  .pile-face .minifoto{
    position:absolute;width:52px;height:58px;border:3px solid var(--ink);border-radius:4px;
    background:#fff;overflow:hidden;filter:grayscale(.5) brightness(.9);transform:rotate(-8deg);
  }
  .pile-face .minifoto img{width:100%;height:100%;object-fit:cover;opacity:.85}
  .pile-face .donetag{
    position:absolute;color:#9be15d;border:3px solid #9be15d;border-radius:8px;padding:1px 9px;
    font-family:'Bangers',cursive;font-size:17px;letter-spacing:1px;transform:rotate(-10deg);
    background:rgba(26,23,20,.65);white-space:nowrap;
  }

  #vignette{
    position:fixed;inset:0;pointer-events:none;z-index:15;
    background:radial-gradient(82% 76% at 50% 50%, transparent 54%, rgba(10,8,6,.58) 100%);
  }

  #focusBar{
    position:fixed;left:50%;transform:translateX(-50%);
    bottom:calc(env(safe-area-inset-bottom, 0px) + 104px);
    z-index:46;display:flex;gap:10px;
  }
  #paintCard{
    position:fixed;left:50%;top:46%;transform:translate(-50%,-50%);
    z-index:45;border:5px solid var(--ink);border-radius:12px;overflow:hidden;
    background:#fff;box-shadow:8px 10px 0 rgba(0,0,0,.45);
    touch-action:none;cursor:crosshair;animation:pop .25s ease;
  }
  #paintCard.molde{border-radius:46% 54% 48% 52% / 62% 58% 40% 44%}
  #paintCard img,#paintCard canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  #paintPct{
    position:fixed;left:50%;transform:translateX(-50%);z-index:46;
    background:var(--yellow);border:3px solid var(--ink);border-radius:10px;
    padding:3px 14px;font-family:'Bangers',cursive;font-size:21px;letter-spacing:1px;
    box-shadow:3px 3px 0 var(--ink);white-space:nowrap;
  }

  /* ================= BONECO DE TERNO ================= */
  #hero{
    position:fixed;left:50%;bottom:4%;transform:translateX(-50%);
    width:132px;height:240px;z-index:20;pointer-events:none;
    filter:drop-shadow(0 14px 10px rgba(0,0,0,.5));
    transition:transform .5s ease, opacity .3s ease;
  }
  #hero.walking{animation:bob .46s ease-in-out infinite}
  #hero.climb{transform:translateX(-50%) translateY(-24vh) scale(.86)}
  #hero g{transform-box:fill-box}
  #hero .legL,#hero .legR{transform-origin:50% 6%}
  #hero.walking .legL{animation:legL .46s ease-in-out infinite}
  #hero.walking .legR{animation:legR .46s ease-in-out infinite}
  #hero.climb .legL{animation:legL .5s ease-in-out infinite}
  #hero.climb .legR{animation:legR .5s ease-in-out infinite}
  #hero .armL,#hero .armR{transform-origin:50% 8%}
  #hero.walking .armL{animation:armL .46s ease-in-out infinite}
  #hero.walking .armR{animation:armR .46s ease-in-out infinite}
  #hero.holding .armR{animation:none;transform:rotate(-135deg);transition:transform .25s ease}
  #hero.holding .armL{animation:none;transform:rotate(135deg);transition:transform .25s ease}
  #hero.throwing .armR{animation:throwArmR .6s ease}
  #hero.throwing .armL{animation:throwArmL .6s ease}

  .fx-ladder{
    position:fixed;width:92px;height:58vh;bottom:-64vh;z-index:18;
    transition:bottom .32s ease, opacity .3s;
    filter:drop-shadow(6px 8px 6px rgba(0,0,0,.45));
  }
  .fx-ladder .rail{
    position:absolute;top:0;bottom:0;width:14px;border:3px solid var(--ink);border-radius:6px;
    background:linear-gradient(90deg,#a06b3d,#7c4d24);
  }
  .fx-ladder .rail.l{left:0}.fx-ladder .rail.r{right:0}
  .fx-ladder .rungs{
    position:absolute;left:12px;right:12px;top:12px;bottom:12px;
    background:repeating-linear-gradient(180deg, transparent 0 30px, #8a5a33 30px 42px);
  }
  .fx-ladder .rungs::before{
    content:'';position:absolute;inset:0;
    background:repeating-linear-gradient(180deg, transparent 0 30px, rgba(26,23,20,.9) 30px 33px, transparent 33px 39px, rgba(26,23,20,.9) 39px 42px);
  }

  /* ================= HUD ================= */
  #hud-top{
    position:fixed;top:0;left:0;right:0;z-index:40;
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:10px 14px;
    padding-left:max(14px, env(safe-area-inset-left));
    padding-right:max(14px, env(safe-area-inset-right));
    pointer-events:none;
  }
  #hud-top > *{pointer-events:auto}
  .logo{
    position:relative;display:inline-block;background:linear-gradient(180deg,#bb8147,#9a6630);
    color:var(--ink);font-family:'Bangers',cursive;font-size:24px;letter-spacing:2px;
    padding:5px 14px;border:3px solid var(--ink);border-radius:6px;box-shadow:4px 4px 0 rgba(0,0,0,.5);
    transform:rotate(-1.5deg);text-shadow:1px 1px 0 rgba(255,255,255,.3);white-space:nowrap;cursor:pointer;
  }
  .pow{
    display:grid;place-items:center;position:absolute;right:-24px;top:-14px;width:44px;height:44px;
    background:var(--yellow);color:#e23b2e;font-family:'Bangers',cursive;font-size:14px;
    border:3px solid var(--ink);transform:rotate(8deg);
    clip-path:polygon(50% 0%,61% 22%,84% 16%,76% 39%,100% 50%,76% 61%,84% 84%,61% 78%,50% 100%,39% 78%,16% 84%,24% 61%,0% 50%,24% 39%,16% 16%,39% 22%);
    animation:powp 1.6s ease-in-out infinite;
  }
  .spacer{flex:1;min-width:8px}
  .totalpill{
    display:flex;align-items:center;background:rgba(26,23,20,.85);color:var(--paper);
    border-radius:20px;padding:6px 12px;font-weight:800;font-size:12px;white-space:nowrap;
    border:2px solid rgba(250,245,230,.25);
  }
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    font-weight:800;font-size:13px;color:var(--ink);
    border:3px solid var(--ink);border-radius:10px;padding:7px 11px;
    box-shadow:3px 3px 0 rgba(0,0,0,.5);cursor:pointer;background:var(--paper);
    min-height:40px;
  }
  .btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(0,0,0,.5)}
  .btn.yellow{background:var(--yellow)}
  .btn.green{background:var(--green);font-size:15px}
  .btn.danger{background:var(--red);color:#fff}
  .btn.mini{min-height:32px;font-size:12px;padding:5px 9px;box-shadow:2px 2px 0 var(--ink)}

  #hud-rot{
    position:fixed;z-index:40;
    left:max(14px, env(safe-area-inset-left));
    bottom:max(14px, env(safe-area-inset-bottom));
    display:flex;flex-direction:column;gap:10px;
  }
  #hud-walk{
    position:fixed;z-index:40;
    right:max(14px, env(safe-area-inset-right));
    bottom:max(14px, env(safe-area-inset-bottom));
    display:flex;flex-direction:column;gap:10px;
  }
  .walkbtn{
    width:66px;height:66px;border-radius:50%;
    border:4px solid var(--ink);background:var(--paper);
    box-shadow:4px 4px 0 rgba(0,0,0,.5);cursor:pointer;
    display:grid;place-items:center;font-size:25px;font-weight:800;color:var(--ink);
    user-select:none;-webkit-user-select:none;
  }
  .walkbtn:active,.walkbtn.hold{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(0,0,0,.5);background:var(--yellow)}
  .walkbtn.zoom{width:52px;height:52px;font-size:20px}
  .walkbtn.lift{background:#cfe8ff}
  .walkbtn.lift:active,.walkbtn.lift.hold{background:var(--yellow)}
  #hint-keys{
    position:fixed;left:50%;transform:translateX(-50%);z-index:39;
    bottom:max(14px, env(safe-area-inset-bottom));
    background:rgba(250,245,230,.92);border:3px solid var(--ink);border-radius:10px;
    box-shadow:3px 3px 0 rgba(0,0,0,.5);padding:7px 12px;
    font-family:'Patrick Hand',cursive;font-size:15px;max-width:420px;text-align:center;
  }
  #altBadge{
    position:fixed;left:50%;transform:translateX(-50%);top:64px;z-index:39;
    background:rgba(26,23,20,.8);color:var(--paper);border:2px solid rgba(250,245,230,.3);
    border-radius:16px;padding:3px 12px;font-weight:800;font-size:12px;display:none;
  }

  #toast{
    position:fixed;left:50%;top:16%;transform:translateX(-50%);z-index:70;
    background:var(--yellow);border:4px solid var(--ink);border-radius:12px;
    font-family:'Bangers',cursive;font-size:22px;letter-spacing:1px;padding:8px 18px;
    box-shadow:5px 5px 0 rgba(0,0,0,.5);display:none;text-align:center;max-width:88vw;
  }

  /* ================= PAINÉIS ================= */
  .overlay-veil{
    position:fixed;inset:0;background:rgba(12,10,8,.6);z-index:60;
    display:flex;align-items:center;justify-content:center;
    padding:14px;padding-bottom:max(14px, env(safe-area-inset-bottom));touch-action:auto;
  }
  .panel{
    background:var(--paper);border:4px solid var(--ink);border-radius:16px;
    box-shadow:10px 10px 0 rgba(0,0,0,.55);
    width:min(840px,96vw);max-height:92dvh;
    display:flex;flex-direction:column;overflow:hidden;animation:pop .22s ease;
  }
  .panel-head{
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    padding:12px 14px;border-bottom:3px solid var(--ink);
    background:linear-gradient(180deg,#efe7d2,#e7ddc2);
  }
  .panel-head h2{font-family:'Bangers',cursive;font-size:24px;letter-spacing:1px;margin:0}
  .panel-head .close{
    margin-left:auto;width:34px;height:34px;border-radius:50%;background:var(--red);color:#fff;
    border:3px solid var(--ink);font-weight:800;font-size:17px;cursor:pointer;line-height:1;flex:none;
  }
  .panel-body{padding:14px;overflow:auto;-webkit-overflow-scrolling:touch}
  .empty{text-align:center;color:var(--muted);font-family:'Patrick Hand',cursive;font-size:19px;padding:22px 0}
  .rowline{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .storagebar{
    border:2.5px solid var(--ink);border-radius:10px;background:#fff;overflow:hidden;
    height:16px;flex:1;min-width:120px;position:relative;
  }
  .storagebar i{display:block;height:100%;background:linear-gradient(90deg,#9be15d,#ffd23f 70%,#cf5c4b)}
  .storagetxt{font-size:12px;font-weight:800;white-space:nowrap}
  .shelf-section{
    border:3px solid var(--ink);border-radius:12px;background:var(--paper2);
    box-shadow:4px 4px 0 rgba(26,23,20,.2);padding:12px;margin-bottom:16px;
  }
  .shelf-section .shead{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .shelf-section .shead input{
    flex:1;min-width:140px;background:var(--tag);border:2.5px solid var(--ink);border-radius:8px;
    padding:5px 10px;font-family:'Patrick Hand',cursive;font-size:20px;outline:none;color:var(--ink);
  }
  .xbtn{
    width:28px;height:28px;border-radius:50%;background:var(--red);color:#fff;
    border:3px solid var(--ink);font-weight:800;font-size:14px;cursor:pointer;line-height:1;
    display:grid;place-items:center;padding:0;flex:none;
  }
  .meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:22px 12px}
  .meta-card{position:relative;height:206px;animation:pop .2s ease}
  .meta-card .xbtn{position:absolute;top:-8px;right:-8px;width:26px;height:26px;font-size:13px;z-index:9}
  .meta-card .shapechip{
    position:absolute;top:-8px;left:-6px;z-index:9;background:var(--tag);border:2.5px solid var(--ink);
    border-radius:8px;padding:2px 7px;font-size:10px;font-weight:800;
  }
  .meta-cover{
    position:absolute;left:0;right:0;top:0;bottom:66px;border:3px solid var(--ink);border-radius:10px;
    overflow:hidden;background:#fff;box-shadow:4px 4px 0 rgba(0,0,0,.35);cursor:pointer;
  }
  .meta-cover img{width:100%;height:100%;object-fit:cover;display:block}
  .meta-name{

  #fx{position:fixed;inset:0;z-index:55;pointer-events:none}
  .flying-photo{
    position:fixed;border:4px solid var(--ink);border-radius:8px;background:#fff;overflow:hidden;

    filter:blur(2px);

  .fx-stamp{
    position:fixed;transform:translate(-50%,-50%) rotate(-12deg);
    color:#2e8b57;border:5px solid #2e8b57;border-radius:12px;padding:4px 18px;
    font-family:'Bangers',cursive;font-size:42px;letter-spacing:2px;

  @media (max-width:760px){

</style>

<script>
'use strict';
/* ================================================================
   ARQUIVO POW! — Corredor Infinito de Metas
   · SALVAMENTO SEGURO: fotos compactadas + aviso se a memória encher
   · sala grande, colisão, parede de trás some ao girar
   · sobe/desce · pintura no superzoom · quebra com vidro e poeira
   Dados: localStorage 'guardador.de.links.v1'
   ================================================================ */

window.addEventListener('error', function(ev){
  try{
    var b=document.getElementById('errbox');
    if(!b) return;
    b.style.display='block';
    b.textContent='ERRO: '+(ev.message||'?')+(ev.lineno?(' — linha '+ev.lineno):'');
  }catch(_){}
});

const KEY = 'guardador.de.links.v1';
const HALFW = 900;
const FLOOR_Y = 230, CEIL_Y = -820;
const PANEL_W = 340, PANEL_H = 470;
const GAP = 700;
const Z_START = 900;
const NEAR = 620;
const OBJ_MAXH = 118, OBJ_MINH = 52;
const GRID = 24;
const ROWS_Y = [120, 270, 420];
const COLS_X = [26, 130, 234];
const WALL_PAD = 300;
const MAX_SIDE = 1200, JPEG_Q = 0.86;   /* compressão das fotos */
const QUOTA_KB = 4800;                  /* teto prático do localStorage */

const S = {
  data:null, view:'walk',
  cx:0, cy:0, cz:400, yaw:0, zoom:1,
  walkDir:0, rotDir:0, strafeDir:0, zoomDir:0, liftDir:0,
  throwing:false, focus:null, camTween:null, uploader:null, _paintCard:null,
  _zFar:-3000, _wallFaces:null
};

const uid = () => Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-3);
const el = (tag, cls, html) => { const e=document.createElement(tag); if(cls) e.className=cls; if(html!==undefined) e.innerHTML=html; return e; };
const esc = s => String(s??'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const plural = (n,s) => n+' '+s+(n===1?'':'s');
const rad = d => d*Math.PI/180;
const clampY = v => Math.max(CEIL_Y+170, Math.min(FLOOR_Y-70, v));
const clampX = x => Math.max(-HALFW+WALL_PAD, Math.min(HALFW-WALL_PAD, x));
const clampZ = z => Math.max(S._zFar+WALL_PAD, Math.min(Z_START-WALL_PAD, z));
const paintPctOf = t => Math.max(0, Math.min(100, Math.round(t.paint||0)));
const grayFilterOf = t => 'grayscale('+(1 - paintPctOf(t)/100).toFixed(2)+')';

/* ---------- COMPRESSÃO DE FOTO (o que resolve a perda de dados) ---------- */
function compressImage(src, maxSide, quality, cb){
  const im=new Image();
  im.onload=()=>{
    let w=im.naturalWidth||800, h=im.naturalHeight||800;
    const ar = h>0 ? w/h : 1;
    const scale=Math.min(1, maxSide/Math.max(w,h));
    w=Math.max(1,Math.round(w*scale)); h=Math.max(1,Math.round(h*scale));
    try{
      const cv=document.createElement('canvas');
      cv.width=w; cv.height=h;
      const ctx=cv.getContext('2d');
      ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h);
      ctx.drawImage(im,0,0,w,h);
      const out=cv.toDataURL('image/jpeg', quality);
      cb((out && out.length<src.length) ? out : src, ar);
    }catch(_){ cb(src, ar); }
  };
  im.onerror=()=>cb(src, 1);
  im.src=src;
}
function dataKB(){ try{ return Math.round(JSON.stringify(S.data).length/1024); }catch(e){ return 0; } }

function load(){
  try{
    const r = localStorage.getItem(KEY);
    if(r){ const d=JSON.parse(r); if(d && typeof d==='object'){ migrate(d); return d; } }
  }catch(e){}
  const d = { trophies:[], shelves3d:[], cabinets:[] };
  migrate(d); return d;
}
function migrate(d){
  if(!Array.isArray(d.trophies)) d.trophies=[];
  if(!Array.isArray(d.shelves3d)) d.shelves3d=[];
  if(!Array.isArray(d.cabinets)) d.cabinets=[];
  if(d.shelves3d.length===0) d.shelves3d.push({id:'padrao', name:'Minhas Metas'});
  const first = d.shelves3d[0].id;
  d.trophies.forEach(t=>{
    if(!t.shelfId || !d.shelves3d.some(s=>s.id===t.shelfId)) t.shelfId=first;
    if(t.shape!=='molde') t.shape='bloco';
    if(![1,2,3].includes(t.size)) t.size=1;
    if(typeof t.paint!=='number') t.paint=0;
  });
}
/* salva de verdade e AVISA se não couber */
function save(){
  try{
    localStorage.setItem(KEY, JSON.stringify(S.data));
    S._saveFail=false;
    return true;
  }catch(e){
    S._saveFail=true;
    toast('MEMÓRIA CHEIA — não salvou! Use 🗜️ Compactar fotos');
    return false;
  }
}
/* recompacta todas as fotos guardadas para liberar espaço */
function compactAll(done){
  const list=S.data.trophies.filter(t=>t.image);
  if(!list.length){ if(done) done(true); return; }
  toast('Compactando fotos...');
  let left=list.length;
  list.forEach(t=>{
    compressImage(t.image, 800, 0.62, out=>{
      if(out && out.length<t.image.length) t.image=out;
      if(--left===0){
        const ok=save();
        buildScene(); renderHUD();
        if(S.view==='menu') renderUI();
        if(ok) toast('Fotos compactadas! ('+dataKB()+' KB)');
        if(done) done(ok);
      }
    });
  });
}

function fixMissingAr(){
  if(S._arBusy) return;
  const need = S.data.trophies.filter(t=>t.image && !(t.ar>0));
  if(!need.length) return;
  S._arBusy = true;
  let left=need.length, changed=false;
  need.forEach(t=>{
    const im=new Image();
    const done=()=>{ if(--left===0){ S._arBusy=false; if(changed){ save(); buildScene(); } } };
    im.onload=()=>{ t.ar = im.naturalHeight>0 ? im.naturalWidth/im.naturalHeight : 86/96; changed=true; done(); };
    im.onerror=()=>{ t.ar=86/96; changed=true; done(); };
    im.src=t.image;
  });
}

const aliveIn  = sid => S.data.trophies.filter(t=>!t.broken && t.shelfId===sid);
const brokenIn = sid => S.data.trophies.filter(t=> t.broken && t.shelfId===sid);
const aliveAll = () => S.data.trophies.filter(t=>!t.broken);
const brokenAll= () => S.data.trophies.filter(t=> t.broken);

function packShelf(sid){
  const rows=[]; let cur=[], used=0;
  const put=item=>{
    if(used+item.size>3){ rows.push(cur); cur=[]; used=0; }
    item.colStart=used; cur.push(item); used+=item.size;
  };
  aliveIn(sid).forEach(t=>put({t, size:t.size||1}));
  put({slot:true, size:1});
  rows.push(cur);
  return rows;
}
function moduleList(){
  const mods=[];
  S.data.shelves3d.forEach(sh=>{
    const rows=packShelf(sh.id);
    const count=Math.max(1, Math.ceil(rows.length/3));
    for(let k=0;k<count;k++) mods.push({shelf:sh, part:k, parts:count, rows});
  });
  return mods;
}
function corridorLen(){
  const n = moduleList().length;
  return Math.max(3200, Math.ceil(n/2)*GAP + 2200);
}
function unitPlace(u){
  const side = u%2;
  const k = Math.floor(u/2);
  const zBase = -k*GAP - 420 - (side? GAP/2 : 0);
  const top = FLOOR_Y - PANEL_H;
  if(side===0) return { side, zBase, cx:-HALFW, cz:zBase+PANEL_W/2,
    t:`translate3d(${-HALFW+10}px, ${top}px, ${zBase+PANEL_W}px) rotateY(90deg)` };
  return { side, zBase, cx:HALFW, cz:zBase+PANEL_W/2,
    t:`translate3d(${HALFW-10}px, ${top}px, ${zBase}px) rotateY(-90deg)` };
}
function localToWorldZ(P, localX){
  return P.side===0 ? (P.zBase + PANEL_W - localX) : (P.zBase + localX);
}

/* ================================================================ */
const world = document.getElementById('world');
const sceneEls = [];
let modCenters = [];

function face(cls, w, h, transform){
  const d=el('div','face '+cls);
  d.style.width=w+'px'; d.style.height=h+'px'; d.style.transform=transform;
  return d;
}
function track(elm, cx, cz){ sceneEls.push({el:elm, cx, cz}); return elm; }

function buildScene(){
  world.innerHTML='';
  sceneEls.length=0;
  modCenters=[];
  const mods=moduleList();
  const LEN=corridorLen();
  const WH=FLOOR_Y-CEIL_Y;
  const W=HALFW*2;
  S._zFar = Z_START - LEN;

  world.appendChild(face('floor-face', W, LEN, `translate3d(${-HALFW}px, ${FLOOR_Y}px, ${Z_START}px) rotateX(-90deg)`));
  world.appendChild(face('ceil-face',  W, LEN, `translate3d(${-HALFW}px, ${CEIL_Y}px, ${Z_START}px) rotateX(-90deg)`));

  const wL = face('wall-face', LEN, WH, `translate3d(${-HALFW}px, ${CEIL_Y}px, ${Z_START}px) rotateY(90deg)`);
  const wR = face('wall-face', LEN, WH, `translate3d(${HALFW}px, ${CEIL_Y}px, ${Z_START-LEN}px) rotateY(-90deg)`);
  const wF = face('wall-face', W, WH, `translate3d(${-HALFW}px, ${CEIL_Y}px, ${Z_START-LEN}px)`);
  const wB = face('wall-face', W, WH, `translate3d(${HALFW}px, ${CEIL_Y}px, ${Z_START}px) rotateY(180deg)`);
  [wL,wR,wF,wB].forEach(w=>world.appendChild(w));
  S._wallFaces = [ {el:wL,nx:1,nz:0}, {el:wR,nx:-1,nz:0}, {el:wF,nx:0,nz:1}, {el:wB,nx:0,nz:-1} ];

  mods.forEach((M,u)=>{
    const P=unitPlace(u);
    modCenters.push({u, cx:P.cx, cz:P.cz, side:P.side, zBase:P.zBase, shelfId:M.shelf.id});

    const glow=face('shelf-glow', PANEL_W+200, PANEL_H+220, P.t);
    glow.style.transform += ' translate3d(-100px,-150px,-2px)';
    glow.style.pointerEvents='none';
    track(glow, P.cx, P.cz);
    world.appendChild(glow);

    const shelf=face('shelf-face', PANEL_W, PANEL_H, P.t);
    const title=esc(M.shelf.name)+(M.parts>1?' · '+(M.part+1):'');
    shelf.innerHTML='<div class="titleplate">'+title+'</div>'
      +'<div class="post l"></div><div class="post r"></div>'
      +'<div class="foot l"></div><div class="foot r"></div>';
    ROWS_Y.forEach(y=>{
      const g=el('div','glass'); g.style.top=y+'px'; shelf.appendChild(g);
      const cb=el('div','crossbar'); cb.style.top=(y+22)+'px'; shelf.appendChild(cb);
    });

    const modRows=M.rows.slice(M.part*3, M.part*3+3);
    modRows.forEach((rowItems, r)=>{
      rowItems.forEach(item=>{
        const width = item.size===1?86 : item.size===2?196 : 300;
        if(item.slot){
          const slot=el('div','photo-slot','+ subir<br>foto');
          slot.style.left=COLS_X[item.colStart]+'px';
          slot.style.top=(ROWS_Y[r]-100)+'px';
          slot._tap=()=>startUpload(M.shelf.id);
          shelf.appendChild(slot);
        } else {
          const t=item.t;
          const tr=buildObject3D(t, width);
          if(item.size>1) tr.classList.add('wide');
          tr.style.left=(COLS_X[item.colStart]+(width-tr._w)/2)+'px';
          tr.style.top =(ROWS_Y[r]-tr._h-3)+'px';
          tr.dataset.row=r; tr.dataset.mod=u;
          tr._tap=()=>focusObject(t, u, r, tr);
          shelf.appendChild(tr);
        }
      });
    });
    track(shelf, P.cx, P.cz);
    world.appendChild(shelf);

    const tip=el('div','open-tip',title);
    tip.style.display='none'; tip.dataset.tipFor=u;
    const holder=face('', 10, 10, P.t);
    holder.style.overflow='visible';
    holder.style.transform += ' translate3d(170px,-70px,0)';
    holder.appendChild(tip);
    track(holder, P.cx, P.cz);
    world.appendChild(holder);

    if(M.part===0){
      brokenIn(M.shelf.id).forEach((t,i)=>{
        const pw=190, ph=110;
        const px = P.side===0 ? (P.cx+230+i*30) : (P.cx-230-i*30);
        const pz = P.cz + (i%2? 160 : -160) - i*70;
        const pile=face('pile-face', pw, ph, `translate3d(${px-pw/2}px, ${FLOOR_Y-2}px, ${pz+ph/2}px) rotateX(-90deg)`);
        const rnd=mulberry(t.id);
        for(let s2=0;s2<9;s2++){
          const sh=el('div','shard');
          const sz=10+rnd()*20;
          sh.style.cssText += `left:${rnd()*(pw-28)}px;top:${rnd()*(ph-28)}px;width:${sz}px;height:${sz*1.1}px;`
            +`clip-path:polygon(50% 0,100% ${40+rnd()*40}%, ${rnd()*40}% 100%);transform:rotate(${rnd()*360}deg);`;
          pile.appendChild(sh);
        }
        const mf=el('div','minifoto');
        mf.style.cssText += `left:${pw/2-26}px;top:${ph/2-30}px;`;
        mf.innerHTML='<img alt="">'; mf.querySelector('img').src=t.image;
        pile.appendChild(mf);
        const tag=el('div','donetag','CONCLUÍDO');
        tag.style.cssText += `left:${pw/2-56}px;top:${ph-30}px;`;
        pile.appendChild(tag);
        pile._tap=()=>askYes('Limpar os cacos desta meta concluída?', ()=>{ S.data.trophies=S.data.trophies.filter(x=>x.id!==t.id); save(); buildScene(); renderHUD(); });
        track(pile, px, pz);
        world.appendChild(pile);
      });
    }
  });

  updateWorld();
}

function objSize(t, maxW){
  const ar=(t.ar>0)?t.ar:(86/96);
  let h=OBJ_MAXH, w=h*ar;
  if(w>maxW){ w=maxW; h=w/ar; }
  if(h<OBJ_MINH){ h=OBJ_MINH; w=Math.min(maxW, h*ar); }
  return { w:Math.round(w), h:Math.round(h) };
}
function buildObject3D(t, maxW){
  maxW=maxW||86;
  const dim=objSize(t,maxW), w=dim.w, h=dim.h;
  const gray=grayFilterOf(t);
  const tr=el('div','obj3d'+(t.shape==='molde'?' molde':''));
  tr.style.width=w+'px'; tr.style.height=h+'px';
  tr._w=w; tr._h=h; tr.dataset.tid=t.id;
  tr.title=(t.name?t.name+' — ':'')+'toque para pintar!';
  const spin=el('div','spin');
  if(t.shape==='molde'){
    const LAYERS=7, TH=22;
    for(let i=0;i<LAYERS;i++){
      const ly=el('div','layer');
      ly.style.backgroundImage='url('+t.image+')';
      ly.style.transform='translateZ('+(-TH/2+i*(TH/(LAYERS-1)))+'px)';
      ly.style.filter=gray+((i>0&&i<LAYERS-1)?' brightness(.8)':'');
      spin.appendChild(ly);
    }
  } else {
    spin.innerHTML='<div class="f front"><img alt=""></div>'+
      '<div class="f back"><img alt=""></div>'+
      '<div class="edge eL"></div><div class="edge eR"></div>'+
      '<div class="cap cT"></div><div class="cap cB"></div>';
    spin.querySelectorAll('img').forEach(im=>{ im.src=t.image; im.style.filter=gray; });
    spin.querySelector('.eL').style.transform='rotateY(-90deg) translateZ('+(w/2)+'px)';
    spin.querySelector('.eR').style.transform='rotateY(90deg) translateZ('+(w/2)+'px)';
    spin.querySelector('.cT').style.transform='rotateX(90deg) translateZ('+(h/2)+'px)';
    spin.querySelector('.cB').style.transform='rotateX(-90deg) translateZ('+(h/2)+'px)';
  }
  spin.style.animationDelay=(-(Math.abs(hashCode(t.id))%12))+'s';
  tr.appendChild(el('div','sombra'));
  tr.appendChild(spin);
  return tr;
}
function hashCode(s){ let h=0; for(const c of s) h=(h*31+c.charCodeAt(0))|0; return h; }
function mulberry(seedStr){
  let h=1779033703; for(const ch of String(seedStr)) h=Math.imul(h^ch.charCodeAt(0),3432918353);
  return function(){ h=Math.imul(h^(h>>>16),2246822507); h=Math.imul(h^(h>>>13),3266489909); return ((h^=h>>>16)>>>0)/4294967296; };
}

/* ============ SUPERZOOM + PINTURA ============ */
function camTo(target, dur){
  S.camTween={ from:{cx:S.cx, cy:S.cy, cz:S.cz, yaw:S.yaw, zoom:S.zoom}, to:target, t0:performance.now(), dur:dur||480 };
}
function focusObject(t, u, r, tr){
  const m=modCenters.find(x=>x.u===u); if(!m) return;
  if(S.focus && S.focus.tid===t.id) return;
  const saved = S.focus ? S.focus.saved : {cx:S.cx, cy:S.cy, cz:S.cz, yaw:S.yaw, zoom:S.zoom};
  softClearFocus();
  const size=t.size||1;
  const dist=Math.max(WALL_PAD+10, 320+(size-1)*80);
  const localX=tr ? (parseFloat(tr.style.left)+(tr._w||86)/2) : PANEL_W/2;
  const worldZ=localToWorldZ(m, localX);
  const cx = m.side===0 ? (-HALFW+dist) : (HALFW-dist);
  const yaw = m.side===0 ? -90 : 90;
  const objY = (FLOOR_Y-PANEL_H) + ROWS_Y[r||0] - (tr? tr._h/2 : 55);
  const zoom = size===1?2.3 : size===2?1.8 : 1.4;
  S.focus={ tid:t.id, saved, t, u, r, trEl:tr };
  camTo({cx:clampX(cx), cy:clampY(objY), cz:clampZ(worldZ), yaw, zoom}, 520);
  hero.style.opacity='.2';
  showFocusUI(t,u,r);
  setTimeout(()=>{
    if(S.focus && S.focus.tid===t.id){
      if(tr) tr.style.visibility='hidden';
      openPaintCard(t);
    }
  }, 560);
}
function exitFocus(){
  if(!S.focus) return;
  const s=S.focus.saved;
  softClearFocus();
  camTo(s, 470);
}
function softClearFocus(){
  if(!S.focus) return;
  closePaintCard();
  if(S.focus.trEl) S.focus.trEl.style.visibility='';
  S.focus=null; hideFocusUI(); hero.style.opacity='';
  buildScene();
}
function showFocusUI(t,u,r){
  hideFocusUI();
  const bar=el('div'); bar.id='focusBar';
  const b1=el('button','btn danger','💥 Jogar no chão');
  b1.onclick=()=>{ softClearFocus(); tryThrow(t,u,r); };
  const b2=el('button','btn','✕ Sair (ESC)');
  b2.onclick=()=>exitFocus();
  bar.appendChild(b1); bar.appendChild(b2);
  document.body.appendChild(bar);
}
function hideFocusUI(){ const b=document.getElementById('focusBar'); if(b) b.remove(); }

function openPaintCard(t){
  closePaintCard();
  const ar=t.ar>0?t.ar:86/96;
  const vw=innerWidth, vh=innerHeight;
  let cw=Math.min(vw*0.80,540), ch=cw/ar;
  const maxH=vh*0.52;
  if(ch>maxH){ ch=maxH; cw=ch*ar; }
  cw=Math.round(cw); ch=Math.round(ch);

  const card=el('div'); card.id='paintCard';
  if(t.shape==='molde') card.classList.add('molde');
  card.style.width=cw+'px'; card.style.height=ch+'px';

  const img=el('img'); img.src=t.image; img.alt='';
  img.style.objectFit='cover'; img.style.filter='grayscale(1)';
  card.appendChild(img);

  const cv=document.createElement('canvas');
  cv.width=cw*2; cv.height=ch*2;
  card.appendChild(cv);

  const pctTag=el('div'); pctTag.id='paintPct';
  pctTag.style.top='calc(46% - '+(Math.round(ch/2)+40)+'px)';
  document.body.appendChild(pctTag);
  document.body.appendChild(card);

  if(!t.maskGrid || t.maskGrid.length!==GRID*GRID) t.maskGrid='0'.repeat(GRID*GRID);
  const grid=t.maskGrid.split('');

  const mask=document.createElement('canvas');
  mask.width=cv.width; mask.height=cv.height;
  const mctx=mask.getContext('2d');
  const cellW=mask.width/GRID, cellH=mask.height/GRID;
  mctx.fillStyle='#fff';
  for(let i=0;i<grid.length;i++) if(grid[i]==='1'){
    const gx=i%GRID, gy=(i/GRID)|0;
    mctx.fillRect(gx*cellW-3, gy*cellH-3, cellW+6, cellH+6);
  }

  const colorImg=new Image();
  const ctx=cv.getContext('2d');
  function composite(){
    ctx.clearRect(0,0,cv.width,cv.height);
    ctx.drawImage(colorImg,0,0,cv.width,cv.height);
    ctx.globalCompositeOperation='destination-in';
    ctx.drawImage(mask,0,0);
    ctx.globalCompositeOperation='source-over';
  }
  colorImg.onload=composite; colorImg.src=t.image;

  const pct=()=>{ let c=0; for(const g of grid) if(g==='1') c++; return Math.round(c/grid.length*100); };
  let pinged = pct()>=100;
  function updPct(){
    const p=pct();
    pctTag.textContent='🎨 '+p+'%'+(p>=100?' — PINTADO!':'');
    if(p>=100 && !pinged){
      pinged=true; toast('PINTADO! 🎨');
      const stamp=el('div','fx-stamp','PINTADO!');
      stamp.style.cssText+='left:50%;top:28%;color:#c2571f;border-color:#c2571f;';
      document.getElementById('fx').appendChild(stamp);
      setTimeout(()=>stamp.remove(),1400);
    }
  }
  const R=Math.max(cellW,cellH)*1.7;
  function paintAt(clientX, clientY){
    const rr=card.getBoundingClientRect();
    const x=(clientX-rr.left)/rr.width*cv.width;
    const y=(clientY-rr.top)/rr.height*cv.height;
    mctx.beginPath(); mctx.arc(x,y,R,0,Math.PI*2); mctx.fill();
    const gx0=Math.max(0,Math.floor((x-R)/cellW)), gx1=Math.min(GRID-1,Math.floor((x+R)/cellW));
    const gy0=Math.max(0,Math.floor((y-R)/cellH)), gy1=Math.min(GRID-1,Math.floor((y+R)/cellH));
    for(let gy=gy0;gy<=gy1;gy++)for(let gx=gx0;gx<=gx1;gx++){
      const px=(gx+.5)*cellW, py=(gy+.5)*cellH;
      if(Math.hypot(px-x,py-y)<=R+cellW*.3) grid[gy*GRID+gx]='1';
    }
    composite(); updPct();
  }
  function flush(){ t.maskGrid=grid.join(''); t.paint=pct(); }
  let painting=false;
  card.addEventListener('pointerdown', e=>{
    e.preventDefault(); e.stopPropagation(); painting=true;
    try{ card.setPointerCapture(e.pointerId); }catch(_){}
    paintAt(e.clientX,e.clientY);
  });
  card.addEventListener('pointermove', e=>{ if(painting){ e.preventDefault(); paintAt(e.clientX,e.clientY); } });
  const stop=()=>{ if(painting){ painting=false; flush(); save(); } };
  card.addEventListener('pointerup', stop);
  card.addEventListener('pointercancel', stop);

  updPct();
  S._paintCard={ card, pctTag, flush };
}
function closePaintCard(){
  const pc=S._paintCard; if(!pc) return;
  pc.flush(); save(); pc.card.remove(); pc.pctTag.remove(); S._paintCard=null;
}

/* ============ TOQUE PRÓPRIO ============ */
function tapPick(x,y){
  const PAD=14, cands=[];
  document.querySelectorAll('.obj3d, .photo-slot, .pile-face').forEach(n=>{
    if(!n._tap) return;
    if(getComputedStyle(n).visibility==='hidden') return;
    const r=n.getBoundingClientRect();
    if(r.width<4||r.height<4) return;
    if(x>=r.left-PAD && x<=r.right+PAD && y>=r.top-PAD && y<=r.bottom+PAD){
      const dc=Math.abs(x-(r.left+r.right)/2)+Math.abs(y-(r.top+r.bottom)/2);
      cands.push({n, area:r.width*r.height, dc});
    }
  });
  if(cands.length){
    cands.sort((a,b)=> (a.area-b.area)||(a.dc-b.dc));
    const n=cands[0].n;
    if(S.focus && !n.classList.contains('obj3d')) softClearFocus();
    n._tap(); return true;
  }
  if(S.focus){ exitFocus(); return true; }
  const shelves=document.querySelectorAll('.shelf-face');
  for(const n of shelves){
    if(getComputedStyle(n).visibility==='hidden') continue;
    const r=n.getBoundingClientRect();
    if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom){ openMenu(); return true; }
  }
  return false;
}

/* ---------- câmera ---------- */
function updateWorld(){
  world.style.transform = `rotateY(${S.yaw}deg) translate3d(${-S.cx}px, ${-S.cy}px, ${-S.cz}px)`;
  const cyy=Math.cos(rad(S.yaw)), syy=Math.sin(rad(S.yaw));
  sceneEls.forEach(o=>{
    const dx=o.cx-S.cx, dz=o.cz-S.cz;
    const zc=dz*cyy-dx*syy;
    o.el.style.visibility=(zc>200)?'hidden':'';
  });
  if(S._wallFaces){
    const fx=Math.sin(rad(S.yaw)), fz=-Math.cos(rad(S.yaw));
    S._wallFaces.forEach(w=>{
      const dot = w.nx*fx + w.nz*fz;
      w.el.style.visibility = (dot > 0.30) ? 'hidden' : '';
    });
  }
  let bestU=-1, bestD=1e9;
  modCenters.forEach(m=>{
    const d=Math.hypot(m.cx-S.cx, m.cz-S.cz);
    if(d<bestD){ bestD=d; bestU=m.u; }
  });
  document.querySelectorAll('.open-tip').forEach(t=>{
    t.style.display=(bestD<NEAR && +t.dataset.tipFor===bestU && !S.focus)?'':'none';
  });
  S.nearUnit = bestD<NEAR ? bestU : null;
  const alt=document.getElementById('altBadge');
  const h=Math.round((FLOOR_Y-S.cy)/2);
  if(Math.abs(S.cy)>6){ alt.style.display='block'; alt.textContent='altura: '+h+' cm'; }
  else alt.style.display='none';
}

const hero=document.getElementById('hero');
let lastT=0;
function tick(t){
  const dt=Math.min(40, t-lastT); lastT=t;

  if(S.camTween){
    const T=S.camTween;
    let k=Math.min(1,(t-T.t0)/T.dur); k=k*k*(3-2*k);
    const dyaw=((((T.to.yaw-T.from.yaw)%360)+540)%360)-180;
    S.cx=T.from.cx+(T.to.cx-T.from.cx)*k;
    S.cy=T.from.cy+(T.to.cy-T.from.cy)*k;
    S.cz=T.from.cz+(T.to.cz-T.from.cz)*k;
    S.yaw=T.from.yaw+dyaw*k;
    S.zoom=T.from.zoom+(T.to.zoom-T.from.zoom)*k;
    applyZoom();
    if(k>=1) S.camTween=null;
  }

  let moving=false;
  if(S.view==='walk' && !S.throwing && !S.focus && !S.camTween){
    if(S.rotDir!==0) S.yaw += S.rotDir*.11*dt;
    if(S.walkDir!==0){
      const v=S.walkDir*.55*dt;
      S.cx = clampX(S.cx + Math.sin(rad(S.yaw))*v);
      S.cz = clampZ(S.cz + (-Math.cos(rad(S.yaw)))*v);
      moving=true;
    }
    if(S.strafeDir!==0){
      const v=S.strafeDir*.48*dt;
      S.cx = clampX(S.cx + Math.cos(rad(S.yaw))*v);
      S.cz = clampZ(S.cz + Math.sin(rad(S.yaw))*v);
      moving=true;
    }
    if(S.liftDir!==0) S.cy = clampY(S.cy + S.liftDir*.6*dt);
    if(S.zoomDir!==0) zoomBy(S.zoomDir*.55*dt);
  }
  S.cx=clampX(S.cx); S.cz=clampZ(S.cz); S.cy=clampY(S.cy);
  updateWorld();
  hero.classList.toggle('walking', moving && !S.throwing);
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

function zoomBy(amount){
  if(amount<0 && S.zoom>1){ S.zoom=Math.max(1,S.zoom+amount*0.004); applyZoom(); return; }
  const nx=S.cx+Math.sin(rad(S.yaw))*amount;
  const nz=S.cz+(-Math.cos(rad(S.yaw)))*amount;
  const cx=clampX(nx), cz=clampZ(nz);
  const moved=Math.hypot(cx-S.cx, cz-S.cz);
  S.cx=cx; S.cz=cz;
  if(amount>0 && moved<Math.abs(amount)*0.45){ S.zoom=Math.min(3,S.zoom+amount*0.004); applyZoom(); }
}
const dolly=zoomBy;
function applyZoom(){
  const vp=document.getElementById('viewport');
  vp.style.transformOrigin='50% 50%';
  vp.style.transform = S.zoom>1.001 ? 'scale('+S.zoom.toFixed(3)+')' : '';
}

window.addEventListener('keydown', e=>{
  if(e.key==='Escape'){ if(S.focus){ exitFocus(); e.preventDefault(); } return; }
  if(S.view!=='walk'||S.focus) return;
  if(e.target && ['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName)) return;
  const k=e.key.toLowerCase();
  if(k==='w'||e.key==='ArrowUp'){ S.walkDir=1; e.preventDefault(); }
  if(k==='s'||e.key==='ArrowDown'){ S.walkDir=-1; e.preventDefault(); }
  if(k==='a'||e.key==='ArrowLeft'){ S.rotDir=-1; e.preventDefault(); }
  if(k==='d'||e.key==='ArrowRight'){ S.rotDir=1; e.preventDefault(); }
  if(k==='q'){ S.strafeDir=-1; e.preventDefault(); }
  if(k==='e'){ S.strafeDir=1; e.preventDefault(); }
  if(k==='r'){ S.liftDir=-1; e.preventDefault(); }
  if(k==='f'){ S.liftDir=1;  e.preventDefault(); }
  if(e.key==='Enter') openMenu();
});
window.addEventListener('keyup', e=>{
  const k=e.key.toLowerCase();
  if((k==='w'||e.key==='ArrowUp') && S.walkDir===1) S.walkDir=0;
  if((k==='s'||e.key==='ArrowDown') && S.walkDir===-1) S.walkDir=0;
  if((k==='a'||e.key==='ArrowLeft') && S.rotDir===-1) S.rotDir=0;
  if((k==='d'||e.key==='ArrowRight') && S.rotDir===1) S.rotDir=0;
  if(k==='q' && S.strafeDir===-1) S.strafeDir=0;
  if(k==='e' && S.strafeDir===1) S.strafeDir=0;
  if(k==='r' && S.liftDir===-1) S.liftDir=0;
  if(k==='f' && S.liftDir===1) S.liftDir=0;
});

function holdBtn(btn, off, on){
  const down=e=>{ e.preventDefault(); if(S.focus) return; on(); btn.classList.add('hold'); };
  const up=()=>{ off(); btn.classList.remove('hold'); };
  btn.addEventListener('pointerdown', down);
  window.addEventListener('pointerup', up);

holdBtn(document.getElementById('btnZoomOut'), ()=>{ if(S.zoomDir===-1) S.zoomDir=0; }, ()=>S.zoomDir=-1);

let dragMoved=false;
(function(){
  const vp=document.getElementById('viewport');
  const pts=new Map();
  let lastX=0,lastY=0,startX=0,startY=0,pinchDist=0,lastTap=0;

  vp.addEventListener('pointerdown', e=>{
    if(S.view!=='walk') return;
    if(e.isPrimary) pts.clear();
    pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pts.size===1){ lastX=e.clientX; lastY=e.clientY; startX=e.clientX; startY=e.clientY; dragMoved=false; vp.classList.add('dragging'); }
    if(pts.size===2){ const a=[...pts.values()]; pinchDist=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y); }
  });
  window.addEventListener('pointermove', e=>{
    if(!pts.has(e.pointerId)) return;
    pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pts.size===1){
      const dx=e.clientX-lastX, dy=e.clientY-lastY;
      lastX=e.clientX; lastY=e.clientY;
      if(Math.abs(e.clientX-startX)+Math.abs(e.clientY-startY)>11) dragMoved=true;
      if(dragMoved && !S.focus && !S.camTween){
        S.yaw += dx*0.22;
        S.cy = clampY(S.cy - dy*0.9);
      }
    } else if(pts.size===2){
      const a=[...pts.values()];
      const d=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);
      if(!S.focus && !S.camTween) dolly((d-pinchDist)*1.6);
      pinchDist=d; dragMoved=true;
    }
  });
  const end=e=>{
    pts.delete(e.pointerId);
    if(pts.size===0){ vp.classList.remove('dragging'); setTimeout(()=>{dragMoved=false;},60); }
  };
  window.addEventListener('pointerup', end);
  window.addEventListener('pointercancel', end);
  window.addEventListener('blur', ()=>{ pts.clear(); vp.classList.remove('dragging'); dragMoved=false; });

  vp.addEventListener('wheel', e=>{
    if(S.view!=='walk'||S.focus||S.camTween) return;
    e.preventDefault(); dolly(-e.deltaY*0.7);
  }, {passive:false});

  vp.addEventListener('pointerup', e=>{
    if(S.view!=='walk'||dragMoved||S.throwing) return;
    if(tapPick(e.clientX,e.clientY)){ lastTap=0; return; }
    const now=Date.now();
    if(now-lastTap<320){ dolly(240); lastTap=0; } else lastTap=now;
  });
})();

/* ============ UPLOAD (com compressão) ============ */
function startUpload(shelfId){
  S._uploadShelf = shelfId || (S.data.shelves3d[0]&&S.data.shelves3d[0].id);
  document.getElementById('trophyFile').click();
}
document.getElementById('trophyFile').onchange = e=>{
  const file=e.target.files&&e.target.files[0]; if(!file) return;
  toast('Preparando foto...');
  const r=new FileReader();
  r.onload=()=>{
    compressImage(r.result, MAX_SIDE, JPEG_Q, (out, ar)=>{
      S.uploader={ image:out, shelfId:S._uploadShelf||S.data.shelves3d[0].id, shape:'bloco', size:1, name:'', ar:ar };
      S.view='uploader'; renderUI();
    });
  };
  r.readAsDataURL(file); e.target.value='';
};

function addShelfAsk(cb){
  askText('Nova prateleira (tema)','ex: Viagens, Carro, Estudos...', name=>{
    const sh={id:uid(), name};
    S.data.shelves3d.push(sh);
    if(!save()){ S.data.shelves3d.pop(); return; }
    buildScene(); renderHUD();
    toast('Estante nova no corredor!');
    if(cb) cb(sh);
  });
}

/* ============ ARREMESSO ============ */
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  clearTimeout(t._h); t._h=setTimeout(()=>{ t.style.display='none'; },2200);
}
function askYes(msg,onYes){
  const veil=el('div','overlay-veil'); veil.style.zIndex='90';
  const panel=el('div','panel'); panel.style.width='min(430px,94vw)';
  const body=el('div','panel-body');
  body.appendChild(el('div',null,'<div style="font-family:\'Patrick Hand\',cursive;font-size:20px;margin-bottom:14px">'+esc(msg)+'</div>'));
  const row=el('div','rowline');
  const ok=el('button','btn danger','Sim, pode!');
  ok.onclick=()=>{ veil.remove(); onYes(); };
  const no=el('button','btn','Cancelar'); no.onclick=()=>veil.remove();
  row.appendChild(ok); row.appendChild(no); body.appendChild(row);
  panel.appendChild(body); veil.appendChild(panel);
  veil.onclick=e=>{ if(e.target===veil) veil.remove(); };
  document.getElementById('ui').appendChild(veil);
}
function askText(title,placeholder,onOk){
  const veil=el('div','overlay-veil'); veil.style.zIndex='90';
  const panel=el('div','panel'); panel.style.width='min(440px,94vw)';
  const body=el('div','panel-body');
  body.appendChild(el('div',null,'<div style="font-family:\'Bangers\',cursive;font-size:22px;letter-spacing:1px;margin-bottom:10px">'+esc(title)+'</div>'));
  const inp=el('input'); inp.type='text'; inp.placeholder=placeholder;
  inp.style.cssText='width:100%;border:2.5px solid var(--ink);border-radius:9px;padding:10px 12px;font-size:16px;font-weight:600;background:#fff;outline:none;margin-bottom:12px;';
  inp.onkeydown=e=>{ if(e.key==='Enter') ok.click(); };
  body.appendChild(inp);
  const row=el('div','rowline');
  const ok=el('button','btn green','Criar');
  ok.onclick=()=>{ const v=inp.value.trim(); if(!v){ inp.focus(); return; } veil.remove(); onOk(v); };
  const no=el('button','btn','Cancelar'); no.onclick=()=>veil.remove();
  row.appendChild(ok); row.appendChild(no); body.appendChild(row);
  panel.appendChild(body); veil.appendChild(panel);
  veil.onclick=e=>{ if(e.target===veil) veil.remove(); };
  document.getElementById('ui').appendChild(veil);
  setTimeout(()=>inp.focus(),60);
}

function tryThrow(t, modU, row){
  if(S.throwing) return;
  const m=modCenters.find(x=>x.u===modU);
  if(m){
    const d=Math.hypot(m.cx-S.cx, m.cz-S.cz);
    if(d>NEAR){ toast('Chegue mais perto da estante!'); return; }
  }
  const needsLadder = row!==undefined && row<2;
  grabAndSmash(t, needsLadder);
}
function handPos(){
  const r=hero.getBoundingClientRect();
  return { x:r.left+r.width*0.62, y:r.top+r.height*0.30 };
}
function grabAndSmash(t, needsLadder){
  if(S.throwing) return;
  S.throwing=true;
  S.walkDir=0; S.strafeDir=0; S.rotDir=0; S.liftDir=0;
  hero.classList.remove('walking'); hero.style.opacity='';

  const fx=document.getElementById('fx');
  const vw=innerWidth, vh=innerHeight;
  const trEl=document.querySelector('.obj3d[data-tid="'+t.id+'"]');
  let rect=trEl?trEl.getBoundingClientRect():null;
  if(!rect||rect.width<4) rect={left:vw*.6, top:vh*.3, width:90, height:100};

  let lad=null;
  if(needsLadder){
    lad=el('div','fx-ladder');
    lad.innerHTML='<div class="rail l"></div><div class="rail r"></div><div class="rungs"></div>';
    lad.style.left=Math.max(8,Math.min(vw-100, rect.left+rect.width/2-46))+'px';
    fx.appendChild(lad);
    requestAnimationFrame(()=>{ lad.style.bottom='0'; });
    setTimeout(()=>{ hero.classList.add('climb'); },300);
  }
  const tGrab = needsLadder?950:140;

  setTimeout(()=>{
    if(trEl) trEl.style.visibility='hidden';
    const fw=Math.max(50,rect.width), fh=Math.max(50,rect.height);
    const sc=Math.min(1, 96/fw, 106/fh);
    const gw=Math.round(fw*sc), gh=Math.round(fh*sc);
    const fly=el('div','flying-photo'+(t.shape==='molde'?' molde':''));
    fly.style.cssText += `left:${rect.left}px;top:${rect.top}px;width:${fw}px;height:${fh}px;`;
    fly.innerHTML='<img alt="">';
    const fim=fly.querySelector('img'); fim.src=t.image; fim.style.filter=grayFilterOf(t);
    fx.appendChild(fly);

    hero.classList.add('holding');
    const hp=handPos();
    setTimeout(()=>{
      fly.style.transition='left .34s ease, top .34s ease, width .34s ease, height .34s ease';
      fly.style.left=(hp.x-gw/2)+'px'; fly.style.top=(hp.y-gh)+'px';
      fly.style.width=gw+'px'; fly.style.height=gh+'px';
    },30);

    setTimeout(()=>{
      const finishThrow=()=>{
        const hp2=handPos();
        fly.style.transition='none';
        fly.style.left=(hp2.x-gw/2)+'px'; fly.style.top=(hp2.y-gh)+'px';
        hero.classList.remove('holding');
        hero.classList.remove('throwing'); void hero.offsetWidth;
        hero.classList.add('throwing');
        setTimeout(()=>hero.classList.remove('throwing'),650);
        const startL=hp2.x-gw/2, startT=hp2.y-gh;
        const endX=vw*.5-gw/2, endY=vh*.86;
        const anim=fly.animate([
          { transform:'translate(0,0) rotate(0deg) scale(1)' },
          { transform:`translate(${(endX-startL)*.55}px, ${(endY-startT)*.30 - 110}px) rotate(210deg) scale(1.05)`, offset:.45 },
          { transform:`translate(${endX-startL}px, ${endY-startT}px) rotate(430deg) scale(.92)` }
        ], { duration:620, easing:'cubic-bezier(.3,.1,.7,1)', fill:'forwards' });
        anim.onfinish=()=>{ fly.remove(); smashAt(t, lad); };
      };
      if(needsLadder){
        hero.classList.remove('climb');
        fly.style.transition='left 90ms linear, top 90ms linear';
        const follow=setInterval(()=>{
          const p=handPos();
          fly.style.left=(p.x-gw/2)+'px'; fly.style.top=(p.y-gh)+'px';
        },40);
        setTimeout(()=>{ clearInterval(follow); finishThrow(); },580);
      } else setTimeout(finishThrow,280);
    },430);
  }, tGrab);
}
function smashAt(t, lad){
  const vw=innerWidth, vh=innerHeight;
  const fx=document.getElementById('fx');
  const vp=document.getElementById('viewport');
  vp.classList.remove('shake'); void vp.offsetWidth; vp.classList.add('shake');
  const cx=vw*.5, cy=vh*.88;
  for(let i=0;i<16;i++){
    const sh=el('div','fx-shard');
    const dist=60+Math.random()*180;
    const dx=(Math.random()<.5?-1:1)*Math.random()*dist;
    const dy=-Math.abs(Math.random()*dist);
    sh.style.cssText += `left:${cx}px;top:${cy}px;`;
    sh.animate([
      { transform:'translate(0,0) rotate(0deg)', opacity:1 },
      { transform:`translate(${dx}px, ${dy}px) rotate(${180+Math.random()*360}deg)`, opacity:1, offset:.55 },
      { transform:`translate(${dx*1.15}px, ${dy*.2+120}px) rotate(${360+Math.random()*360}deg)`, opacity:0 }
    ], { duration:750+Math.random()*250, easing:'cubic-bezier(.2,.6,.6,1)', fill:'forwards' })
    .onfinish=()=>sh.remove();
    fx.appendChild(sh);
  }
  for(let i=0;i<9;i++){
    const du=el('div','fx-dust');
    const sz=30+Math.random()*60;
    const dx=(Math.random()-.5)*260, dy=-(10+Math.random()*70);
    du.style.cssText += `left:${cx-sz/2}px;top:${cy-sz/2}px;width:${sz}px;height:${sz}px;`;
    du.animate([
      { transform:'translate(0,10px) scale(.35)', opacity:.9 },
      { transform:`translate(${dx*.6}px, ${dy*.6}px) scale(1.1)`, opacity:.55, offset:.5 },
      { transform:`translate(${dx}px, ${dy}px) scale(1.9)`, opacity:0 }
    ], { duration:900+Math.random()*400, easing:'ease-out', fill:'forwards' })
    .onfinish=()=>du.remove();
    fx.appendChild(du);
  }
  const stamp=el('div','fx-stamp','CONCLUÍDO!');
  stamp.style.cssText += `left:${cx}px;top:${vh*.64}px;`;
  fx.appendChild(stamp);
  setTimeout(()=>stamp.remove(),1500);

  t.broken=true; save();
  setTimeout(()=>{
    S.throwing=false;
    if(lad){ lad.style.bottom='-64vh'; lad.style.opacity='0'; setTimeout(()=>lad.remove(),800); }
    buildScene(); renderHUD();
    if(S.view==='menu') renderUI();
  },350);
}

/* ============ HUD + PAINÉIS ============ */
function renderHUD(){
  const a=aliveAll().length, b=brokenAll().length, s=S.data.shelves3d.length;
  document.getElementById('totalMeta').textContent =
    plural(s,'estante')+' · '+plural(a,'meta')+' · '+b+' concluída'+(b===1?'':'s')+' · '+dataKB()+' KB';
}
function openMenu(){ softClearFocus(); S.view='menu'; renderUI(); }
function closeAll(){ S.view='walk'; S.uploader=null; renderUI(); }
function renderUI(){
  const root=document.getElementById('ui');
  root.innerHTML='';
  if(S.view==='menu') root.appendChild(renderMenu());
  else if(S.view==='uploader') root.appendChild(renderUploader());
}
function panelShell(title){
  const veil=el('div','overlay-veil');
  veil.onclick=e=>{ if(e.target===veil) closeAll(); };
  const panel=el('div','panel');
  const head=el('div','panel-head');
  head.appendChild(el('h2',null,esc(title)));
  const close=el('button','close','×'); close.onclick=closeAll;
  head.appendChild(close); panel.appendChild(head);
  const body=el('div','panel-body'); panel.appendChild(body);
  veil.appendChild(panel);
  return {veil, body};
}
function renderMenu(){
  const {veil, body}=panelShell('Minhas Metas');

  /* barra de espaço usado + compactar */
  const kb=dataKB();
  const pctUse=Math.min(100, Math.round(kb/QUOTA_KB*100));
  const barRow=el('div','rowline');
  const bar=el('div','storagebar'); bar.innerHTML='<i style="width:'+pctUse+'%"></i>';
  barRow.appendChild(bar);
  barRow.appendChild(el('span','storagetxt', kb+' KB usados ('+pctUse+'%)'));
  const bComp=el('button','btn mini','🗜️ Compactar fotos');
  bComp.onclick=()=>compactAll();
  barRow.appendChild(bComp);
  body.appendChild(barRow);
  if(pctUse>80) body.appendChild(el('div',null,'<div style="font-family:\'Patrick Hand\',cursive;font-size:16px;color:#a33;margin:-4px 0 12px">Espaço quase no limite! Compacte as fotos ou exporte um backup.</div>'));

  const line=el('div','rowline');
  const bShelf=el('button','btn yellow','+ nova estante');
  bShelf.onclick=()=>addShelfAsk(()=>renderUI());
  line.appendChild(bShelf); body.appendChild(line);

  S.data.shelves3d.forEach(sh=>{
    const sec=el('div','shelf-section');
    const head=el('div','shead');
    const inp=el('input'); inp.value=sh.name;
    inp.onchange=e=>{ sh.name=e.target.value||sh.name; save(); buildScene(); };
    head.appendChild(inp);
    const bAdd=el('button','btn green mini','+ foto');
    bAdd.onclick=()=>startUpload(sh.id);
    head.appendChild(bAdd);
    const del=el('button','xbtn','×');
    del.onclick=()=>{
      const total=S.data.trophies.filter(t=>t.shelfId===sh.id).length;
      if(S.data.shelves3d.length<=1){ toast('Precisa existir pelo menos uma estante.'); return; }
      if(total>0){ toast('Esvazie a estante antes de excluir.'); return; }
      askYes('Excluir a estante "'+sh.name+'"?', ()=>{
        S.data.shelves3d=S.data.shelves3d.filter(x=>x.id!==sh.id);
        save(); buildScene(); renderHUD(); renderUI();
      });
    };
    head.appendChild(del); sec.appendChild(head);

    const alive=aliveIn(sh.id);
    if(alive.length===0) sec.appendChild(el('div','empty','Estante vazia. Suba uma foto para virar um objeto 3D!'));
    else{
      const grid=el('div','meta-grid');
      alive.forEach(t=>{
        const card=el('div','meta-card');
        card.appendChild(el('div','shapechip',(t.shape==='molde'?'MOLDE':'BLOCO')+(t.size>1?' · '+t.size+'x':'')+' · 🎨'+paintPctOf(t)+'%'));
        const del2=el('button','xbtn','×');
        del2.onclick=e=>{ e.stopPropagation(); askYes('Excluir esta meta?', ()=>{ S.data.trophies=S.data.trophies.filter(x=>x.id!==t.id); save(); buildScene(); renderHUD(); renderUI(); }); };
        card.appendChild(del2);
        const cover=el('div','meta-cover');
        const im=el('img'); im.src=t.image; im.alt=''; im.style.filter=grayFilterOf(t);
        cover.appendChild(im); card.appendChild(cover);
        const nm=el('div','meta-name');
        const inp2=el('input'); inp2.value=t.name||''; inp2.placeholder='nome da meta';
        inp2.onclick=e=>e.stopPropagation();
        inp2.onchange=e=>{ t.name=e.target.value; save(); buildScene(); };
        nm.appendChild(inp2); card.appendChild(nm);
        const smash=el('button','btn danger meta-smash','💥 Jogar no chão');
        smash.onclick=e=>{
          e.stopPropagation(); closeAll();
          const rows=packShelf(sh.id);
          let rowIdx=0;
          rows.forEach((r,i)=>r.forEach(it=>{ if(it.t&&it.t.id===t.id) rowIdx=i; }));
          const part=Math.floor(rowIdx/3);
          const shelfMods=modCenters.filter(m=>m.shelfId===sh.id);
          const modU=shelfMods[part]||shelfMods[0];
          setTimeout(()=>tryThrow(t, modU?modU.u:undefined, rowIdx%3),80);
        };
        card.appendChild(smash);
        grid.appendChild(card);
      });
      sec.appendChild(grid);
    }

    const broken=brokenIn(sh.id);
    if(broken.length>0){
      sec.appendChild(el('div',null,'<h4 class="bangers" style="font-size:18px;margin:12px 0 8px">Concluídas</h4>'));
      broken.forEach(t=>{
        const row=el('div','result-row');
        const fav=el('div','fav');
        const fi=el('img'); fi.src=t.image; fi.alt=''; fi.style.filter='grayscale(.6)';
        fav.appendChild(fi); row.appendChild(fav);
        const info=el('div','info');
        info.appendChild(el('div','rname',esc(t.name||'Meta')));
        info.appendChild(el('div','rpath','CONCLUÍDO — cacos no chão'));
        row.appendChild(info);
        const rest=el('button','goto','restaurar');
        rest.onclick=e=>{ e.stopPropagation(); t.broken=false; save(); buildScene(); renderHUD(); renderUI(); };
        row.appendChild(rest);
        const clean=el('button','goto','limpar cacos');
        clean.style.background='#ffd9d4';
        clean.onclick=e=>{ e.stopPropagation(); askYes('Limpar os cacos e excluir esta meta?', ()=>{ S.data.trophies=S.data.trophies.filter(x=>x.id!==t.id); save(); buildScene(); renderHUD(); renderUI(); }); };
        row.appendChild(clean);
        sec.appendChild(row);
      });
    }
    body.appendChild(sec);
  });
  return veil;
}
function renderUploader(){
  const {veil, body}=panelShell('Novo objeto 3D');
  const up=S.uploader;
  if(!up){ closeAll(); return veil; }
  const grid=el('div','up-grid');
  const prev=el('div','up-preview');
  const pim=el('img'); pim.src=up.image; pim.alt='';
  prev.appendChild(pim); grid.appendChild(prev);
  const fields=el('div','up-fields');

  fields.appendChild(el('label',null,'Nome da meta'));
  const nameInp=el('input'); nameInp.type='text'; nameInp.placeholder='ex: viagem, carro novo, curso...';
  nameInp.value=up.name; nameInp.oninput=e=>{ up.name=e.target.value; };
  fields.appendChild(nameInp);

  fields.appendChild(el('label',null,'Estante (tema)'));
  const selWrap=el('div','rowline'); selWrap.style.marginBottom='0';
  const sel=el('select');
  S.data.shelves3d.forEach(sh=>{
    const o=el('option',null,esc(sh.name)); o.value=sh.id;
    if(sh.id===up.shelfId) o.selected=true;
    sel.appendChild(o);
  });
  sel.onchange=e=>{ up.shelfId=e.target.value; };
  sel.style.flex='1'; selWrap.appendChild(sel);
  const bNew=el('button','btn mini yellow','+ nova');
  bNew.onclick=()=>addShelfAsk(sh=>{ up.shelfId=sh.id; renderUI(); });
  selWrap.appendChild(bNew); fields.appendChild(selWrap);

  fields.appendChild(el('label',null,'Formato do objeto'));
  const shapes=el('div','shape-row');
  const optB=el('button','shape-opt'+(up.shape==='bloco'?' sel':''));
  optB.innerHTML='<div class="ico bloco"></div>Bloco 3D';
  optB.onclick=()=>{ up.shape='bloco'; renderUI(); };
  const optM=el('button','shape-opt'+(up.shape==='molde'?' sel':''));
  optM.innerHTML='<div class="ico molde"></div>Molde recortado';
  optM.onclick=()=>{ up.shape='molde'; renderUI(); };
  shapes.appendChild(optB); shapes.appendChild(optM);
  fields.appendChild(shapes);

  fields.appendChild(el('label',null,'Tamanho na prateleira'));
  const sizes=el('div','shape-row');
  [[1,'1 espaço'],[2,'2 espaços'],[3,'prateleira toda']].forEach(pair=>{
    const sz=pair[0], lb=pair[1];
    const o=el('button','shape-opt'+(up.size===sz?' sel':''));
    const w=sz===1?18:sz===2?36:54;
    o.innerHTML='<div class="ico bloco" style="width:'+w+'px;height:30px"></div>'+lb;
    o.onclick=()=>{ up.size=sz; renderUI(); };
    sizes.appendChild(o);
  });
  fields.appendChild(sizes);

  fields.appendChild(el('div',null,'<div style="font-family:\'Patrick Hand\',cursive;font-size:14px;color:var(--muted)">Foto já otimizada ('+Math.round(up.image.length/1024)+' KB). O objeto nasce em preto e branco, no formato da foto — dê zoom nele e pinte!</div>'));

  const actions=el('div','rowline'); actions.style.marginTop='6px';
  const ok=el('button','btn green','Colocar na estante');
  ok.onclick=()=>{
    const item={ id:uid(), name:up.name.trim(), image:up.image, broken:false, shape:up.shape, size:up.size, shelfId:up.shelfId, ar:up.ar, paint:0 };
    S.data.trophies.push(item);
    if(!save()){
      S.data.trophies.pop();
      askYes('A foto não coube na memória. Compactar todas as fotos e tentar de novo?', ()=>{
        compactAll(()=>{
          S.data.trophies.push(item);
          if(save()){ closeAll(); buildScene(); renderHUD(); toast('Salvo com sucesso!'); }
          else { S.data.trophies.pop(); toast('Ainda sem espaço — apague metas antigas'); }
        });
      });
      return;
    }
    closeAll(); buildScene(); renderHUD();
    toast('Salvo! ('+dataKB()+' KB usados)');
  };
  const cancel=el('button','btn','Cancelar'); cancel.onclick=closeAll;
  actions.appendChild(ok); actions.appendChild(cancel);
  fields.appendChild(actions);
  grid.appendChild(fields); body.appendChild(grid);
  return veil;
}

/* ---------- backup ---------- */
function exportJSON(){
  const blob=new Blob([JSON.stringify(S.data,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='arquivo-pow-backup.json'; document.body.appendChild(a); a.click();
  a.remove(); URL.revokeObjectURL(a.href);
  toast('Backup baixado!');
}
document.getElementById('importFile').onchange = e=>{
  const file=e.target.files&&e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      if(d&&typeof d==='object'){
        migrate(d); S.data=d;
        if(save()) toast('Backup restaurado!');
        softClearFocus();
        Object.assign(S,{view:'walk',cx:0,cy:0,cz:400,yaw:0,zoom:1,uploader:null,camTween:null});
        applyZoom(); buildScene(); renderHUD(); renderUI(); fixMissingAr();
      } else toast('Arquivo inválido.');
    }catch(err){ toast('Não foi possível ler o JSON.'); }
  };
  r.readAsText(file); e.target.value='';
};

document.getElementById('btnLogo').onclick=()=>{ softClearFocus(); Object.assign(S,{cx:0,cy:0,cz:400,yaw:0,zoom:1,camTween:null}); applyZoom(); closeAll(); };
document.getElementById('btnMenu').onclick=openMenu;
document.getElementById('btnAddShelf').onclick=()=>addShelfAsk();
document.getElementById('btnAddPhoto').onclick=()=>startUpload(null);
document.getElementById('btnExport').onclick=exportJSON;
document.getElementById('btnImport').onclick=()=>document.getElementById('importFile').click();

/* ---------- start ---------- */
try{
  S.data=load();
  save();
  buildScene(); renderHUD(); renderUI(); fixMissingAr();
}catch(err){
  var b=document.getElementById('errbox');
  if(b){ b.style.display='block'; b.textContent='ERRO AO INICIAR: '+(err&&err.message?err.message:err); }
}
</script>
